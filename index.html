<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD현대삼호 동반성장부 통합 업무 워크스페이스</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    /* 미니멀 커스텀 스크롤바 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }
   
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 트랜지션 및 애니메이션 설정 */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animation-fade-in {
      animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast-enter {
      animation: slideInRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
   
    .spin-slow {
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* 보기 모드(비활성화) 폼 스타일 */
    #taskForm input:disabled, 
    #taskForm select:disabled, 
    #taskForm textarea:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      background-color: #E5E5EA !important;
      color: #48484A;
    }

    /* select 화살표 커스텀 (시간, 소속 등) */
    .custom-select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2348484A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1em;
      padding-right: 2.5rem;
    }
  </style>
</head>
<body class="min-h-screen bg-[#F2F2F7] text-[#1D1D1F] flex flex-col relative selection:bg-[#007AFF]/20 selection:text-[#007AFF] overflow-x-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Pretendard', system-ui, sans-serif;">

  <div id="toast-container" class="fixed bottom-8 right-8 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

  <!-- 로그인 화면 -->
  <div id="login-container" class="fixed inset-0 bg-[#F2F2F7] z-[200] flex items-center justify-center hidden">
    <div class="bg-white p-8 md:p-10 rounded-[32px] shadow-[0_20px_40px_rgba(0,0,0,0.08)] border border-gray-200 w-full max-w-[400px] mx-4 animation-fade-in">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-[16px] bg-gradient-to-br from-[#007AFF] to-[#0056b3] flex items-center justify-center shadow-lg mb-4">
          <i data-feather="calendar" class="text-white w-7 h-7"></i>
        </div>
        <h2 class="text-[22px] font-bold text-[#1D1D1F] tracking-tight text-center">동반성장부 워크스페이스</h2>
        <p class="text-[14px] text-[#48484A] font-medium mt-1">사내 관리자에게 부여받은 계정으로 로그인해주세요.</p>
      </div>
      <form onsubmit="window.handleLogin(event)" class="flex flex-col gap-4">
        <div>
          <label class="block text-[13px] font-bold text-[#3A3A3C] mb-1.5 pl-1">이메일</label>
          <input id="login_email" type="email" required class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" placeholder="이메일 주소" />
        </div>
        <div>
          <label class="block text-[13px] font-bold text-[#3A3A3C] mb-1.5 pl-1">비밀번호</label>
          <input id="login_password" type="password" required class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" placeholder="비밀번호" />
        </div>
        <button type="submit" id="btn_login" class="mt-2 w-full py-3.5 bg-[#007AFF] hover:bg-[#0062CC] text-white rounded-[12px] text-[15px] font-bold shadow-md transition-all active:scale-95 border border-transparent flex justify-center items-center gap-2">
          <span>로그인</span>
        </button>
        <div class="mt-2 text-center">
          <button type="button" onclick="window.openPasswordModal()" class="text-[13px] text-[#48484A] font-bold hover:text-[#007AFF] transition-colors underline underline-offset-2">
            비밀번호를 변경하시려면 여기를 클릭하세요
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-container" class="flex-1 flex flex-col min-h-screen hidden w-full">
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-gray-300 px-5 md:px-10 py-3.5 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 transition-all">
     
      <!-- Left: Logo & Title -->
      <div class="flex items-center gap-3.5 w-full md:w-auto shrink-0">
        <div class="w-10 h-10 md:w-11 md:h-11 rounded-[12px] bg-gradient-to-br from-[#007AFF] to-[#0056b3] flex items-center justify-center flex-shrink-0 shadow-[0_4px_12px_rgba(0,122,255,0.3)]">
          <i data-feather="calendar" class="text-white w-5 h-5"></i>
        </div>
        <div class="flex flex-col justify-center">
          <h1 class="text-[17px] md:text-[19px] font-bold tracking-tight text-[#1D1D1F] leading-tight">
            HD현대삼호 동반성장부
          </h1>
          <div class="flex items-center gap-2 mt-0.5">
            <p class="text-[13px] text-[#48484A] font-semibold">통합 업무 워크스페이스</p>
            <div id="sync-status" class="flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#E5E5EA] text-[#3A3A3C] cursor-help transition-all border border-gray-300" title="데이터 동기화 상태">
              <i data-feather="loader" class="w-3 h-3 spin-slow"></i> 연결 중...
            </div>
          </div>
        </div>
      </div>

      <!-- Middle: PC 전용 명언 위젯 -->
      <div class="hidden lg:flex flex-1 justify-center items-center px-4 min-w-0">
        <div id="quote-container" class="transition-opacity duration-700 ease-in-out opacity-0 max-w-[550px] xl:max-w-[750px] truncate text-center cursor-default select-none flex flex-col xl:flex-row items-center xl:items-baseline gap-0.5 xl:gap-2">
          <span class="text-[12px] xl:text-[14px] text-[#48484A] font-medium tracking-tight italic truncate w-full" id="quote-text"></span>
          <span class="text-[10px] xl:text-[11px] text-[#86868B] font-bold shrink-0" id="quote-author"></span>
        </div>
      </div>

      <!-- Right: Controls -->
      <div class="flex items-center gap-2 md:gap-3 w-full lg:w-auto shrink-0 mt-3 lg:mt-0">
        <div class="relative flex-1 lg:flex-none">
          <i data-feather="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-[#48484A]"></i>
          <input
            id="searchInput"
            type="text"
            placeholder="검색 (예: 주간보고, 김상생)"
            class="w-full md:w-56 lg:w-72 pl-10 pr-4 py-2 bg-gray-100 hover:bg-gray-200 focus:bg-white border border-gray-300 focus:border-[#007AFF] rounded-[10px] text-[14px] transition-all focus:outline-none focus:ring-4 focus:ring-[#007AFF]/10 placeholder:text-[#86868B] font-semibold"
            oninput="window.handleSearch(this.value)"
          />
        </div>

        <button onclick="window.exportToExcel()" class="bg-white hover:bg-gray-100 border border-gray-300 text-[#1D1D1F] active:scale-95 px-3.5 py-2 rounded-full text-[14px] font-bold flex items-center gap-1.5 transition-all whitespace-nowrap shadow-sm">
          <i data-feather="download" class="w-4 h-4"></i>
          <span class="hidden sm:inline">다운로드</span>
        </button>

        <button onclick="window.openModal()" class="bg-[#007AFF] hover:bg-[#0062CC] active:scale-95 text-white px-4 md:px-5 py-2 rounded-full text-[14px] font-bold flex items-center gap-1.5 transition-all whitespace-nowrap shadow-[0_4px_12px_rgba(0,122,255,0.25)]">
          <i data-feather="plus" class="w-4 h-4"></i>
          <span>새 일정</span>
        </button>

        <button onclick="window.handleLogout()" class="p-2 md:p-2.5 bg-[#F2F2F7] hover:bg-[#E5E5EA] border border-gray-300 text-[#FF3B30] active:scale-95 rounded-full transition-all flex items-center justify-center ml-1 md:ml-0">
          <i data-feather="log-out" class="w-4 h-4 md:w-5 md:h-5"></i>
        </button>
      </div>
    </header>

    <main class="flex-1 p-4 md:p-6 lg:p-8 flex flex-col xl:flex-row gap-6 max-w-[1800px] mx-auto w-full h-full min-h-0 relative">
     
      <div id="initial-loader" class="absolute inset-0 bg-[#F5F5F7]/80 backdrop-blur-xl z-50 flex items-center justify-center rounded-[32px] transition-opacity duration-300">
        <div class="flex flex-col items-center gap-5 bg-white p-8 rounded-[28px] shadow-[0_20px_40px_rgba(0,0,0,0.1)] border border-gray-200">
          <div class="p-4 bg-[#007AFF]/10 rounded-full">
            <i data-feather="loader" class="w-8 h-8 text-[#007AFF] spin-slow"></i>
          </div>
          <div class="text-center">
            <p class="font-bold text-[#1D1D1F] text-[18px]">실시간 서버 연결 중</p>
            <p class="text-[14px] text-[#48484A] mt-1.5 font-medium">클라우드 데이터베이스와 동기화하고 있습니다.</p>
          </div>
        </div>
      </div>

      <div class="flex-1 flex flex-col gap-6 min-w-0 min-h-0">
        <div class="bg-white p-5 md:p-6 rounded-[28px] shadow-sm flex flex-col gap-5 shrink-0 transition-all border border-gray-300">
          <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
            <div class="lg:w-2/5 flex flex-col gap-3">
              <h3 class="text-[13px] font-bold text-[#3A3A3C] flex items-center gap-1.5 uppercase tracking-wider pl-1">
                <i data-feather="filter" class="w-3.5 h-3.5"></i> 파트 필터링
              </h3>
              <div id="filter-buttons" class="bg-[#E5E5EA] p-1.5 rounded-[16px] grid grid-cols-3 gap-1.5"></div>
            </div>
            <div class="lg:w-3/5 flex flex-col gap-3 lg:border-l border-gray-200 lg:pl-8">
              <h3 class="text-[13px] font-bold text-[#3A3A3C] flex items-center gap-1.5 uppercase tracking-wider pl-1">
                <i data-feather="star" class="w-3.5 h-3.5 text-[#FF9500]"></i> 이달의 포커스 업무
              </h3>
              <div id="key-tasks-container" class="flex flex-wrap gap-2 overflow-y-auto max-h-[100px] no-scrollbar"></div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-[28px] shadow-sm flex-1 flex flex-col overflow-hidden min-h-0 border border-gray-300">
          <div class="grid grid-cols-3 items-center p-4 md:p-5 border-b border-gray-200 min-h-[70px] shrink-0 bg-white">
            <div class="flex justify-start items-center gap-3 overflow-hidden">
              <button onclick="window.handleToday()" class="shrink-0 px-4 py-2 text-[14px] font-bold text-[#1D1D1F] bg-[#E5E5EA] hover:bg-gray-300 border border-gray-300 rounded-[10px] transition-colors">오늘</button>
              
              <!-- PC 전용 이달의 생일자 컨테이너 -->
              <div id="month-birthdays" class="hidden xl:flex items-center gap-1.5 text-[12.5px] font-extrabold text-[#0D9488] bg-[#0D9488]/10 px-3 py-1.5 rounded-[8px] border border-[#0D9488]/20 max-w-[450px] 2xl:max-w-[750px] shrink-0"></div>
            </div>
            <div class="flex items-center justify-center gap-4">
              <button onclick="window.handlePrevMonth()" class="p-2 hover:bg-gray-100 border border-transparent hover:border-gray-200 rounded-full transition-colors text-[#48484A] hover:text-[#1D1D1F]">
                <i data-feather="chevron-left" class="w-5 h-5"></i>
              </button>
              <h2 id="calendar-title" class="text-[20px] md:text-[22px] font-bold text-[#1D1D1F] tracking-tight min-w-[140px] text-center whitespace-nowrap"></h2>
              <button onclick="window.handleNextMonth()" class="p-2 hover:bg-gray-100 border border-transparent hover:border-gray-200 rounded-full transition-colors text-[#48484A] hover:text-[#1D1D1F]">
                <i data-feather="chevron-right" class="w-5 h-5"></i>
              </button>
            </div>
            <div id="calendar-legends" class="hidden md:flex flex-wrap justify-end gap-3 text-[12px] font-bold text-[#48484A]"></div>
          </div>

          <div class="grid grid-cols-7 border-b border-gray-200 shrink-0 bg-[#F9F9FB]">
            <div class="text-center py-2.5 text-[12px] font-bold text-[#FF3B30]">일</div>
            <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">월</div>
            <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">화</div>
            <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">수</div>
            <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">목</div>
            <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">금</div>
            <div class="text-center py-2.5 text-[12px] font-bold text-[#007AFF]">토</div>
          </div>

          <div class="flex-1 overflow-y-auto min-h-0 bg-white no-scrollbar">
            <div class="grid grid-cols-7 grid-rows-6 h-full min-h-[500px] md:min-h-[600px] xl:min-h-[650px] border-l border-t border-gray-200" id="calendar-grid"></div>
          </div>
        </div>
      </div>

      <div class="w-full xl:w-[380px] 2xl:w-[420px] bg-white rounded-[28px] shadow-sm flex flex-col h-[450px] md:h-[550px] xl:h-auto max-h-[calc(100vh-6rem)] xl:sticky top-[104px] shrink-0 transition-all border border-gray-300 mt-6 xl:mt-0">
        <div class="p-5 md:p-6 border-b border-gray-200 flex justify-between items-start">
          <div>
            <h2 class="text-[18px] md:text-[20px] font-bold text-[#1D1D1F] mb-1 tracking-tight">상세 일정</h2>
            <p id="daily-focus-title" class="text-[14px] font-bold text-[#48484A] flex items-center"></p>
          </div>
          <button onclick="window.openModal(window.selectedDate)" class="p-2 bg-[#F2F2F7] hover:bg-[#E5E5EA] border border-gray-300 text-[#007AFF] rounded-full transition-colors active:scale-95">
            <i data-feather="plus" class="w-5 h-5"></i>
          </button>
        </div>
        <div id="daily-focus-list" class="flex-1 overflow-y-auto p-3 md:p-4 space-y-2.5 bg-[#F9F9FB] rounded-b-[28px] no-scrollbar"></div>
      </div>
    </main>
  </div> 

  <!-- 모달 UI (최적화 버전) -->
  <div id="taskModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm items-center justify-center z-[100] p-4 hidden flex transition-all duration-300">
      <div class="bg-white rounded-[24px] shadow-2xl w-full max-w-[550px] overflow-hidden flex flex-col max-h-[85vh] animation-fade-in border border-gray-300">
       
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-200 bg-white shrink-0">
          <div><h3 id="modal-title" class="text-[18px] font-bold text-[#1D1D1F] tracking-tight">새로운 일정</h3></div>
          <button onclick="window.closeModal()" class="p-1.5 text-[#48484A] hover:text-[#1D1D1F] hover:bg-[#F2F2F7] border border-transparent rounded-full transition-colors focus:outline-none">
            <i data-feather="x" class="w-4 h-4"></i>
          </button>
        </div>
       
        <form id="taskForm" onsubmit="window.handleTaskSubmit(event)" class="p-5 overflow-y-auto space-y-4 bg-white custom-scrollbar flex-1">
          <div class="flex flex-col gap-2.5">
            <input id="f_title" required type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3.5 py-2.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10" placeholder="일정 제목" />
            <label class="flex items-center gap-1.5 cursor-pointer w-fit pl-1">
              <input type="checkbox" id="f_isFocus" class="w-3.5 h-3.5 text-[#FF9500] rounded-[4px] border-gray-400 focus:ring-[#FF9500] cursor-pointer">
              <span class="text-[13px] font-bold text-[#1D1D1F]">이달의 포커스 업무로 강조</span>
            </label>
          </div>

          <div class="h-px w-full bg-gray-200 my-1"></div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">업무 구분 <span class="text-[#FF3B30]">*</span></label>
              <select id="f_type" class="custom-select w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10 cursor-pointer">
                <option value="individual">개인별 업무</option>
                <option value="section">과단위 업무</option>
                <option value="department">부서단위 업무</option>
              </select>
            </div>
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">소속 파트 <span class="text-[#FF3B30]">*</span></label>
              <select id="f_teamId" onchange="window.handleTeamChange()" class="custom-select w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10 cursor-pointer"></select>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">담당자 명 <span id="assignee_asterisk" class="text-[#FF3B30]">*</span></label>
              <input id="f_assignee" required type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-2 focus:ring-[#007AFF]/10" placeholder="예: 김상생 책임" />
            </div>
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">장소</label>
              <input id="f_location" type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-2 focus:ring-[#007AFF]/10" placeholder="선택 사항" />
            </div>
          </div>

          <div class="h-px w-full bg-gray-200 my-1"></div>

          <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">시작 날짜 <span class="text-[#FF3B30]">*</span></label>
                <input id="f_startDate" required type="date" onchange="window.handleTimeConstraints()" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none cursor-pointer" />
              </div>
              <div>
                <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">종료 날짜 <span class="text-[#FF3B30]">*</span></label>
                <input id="f_endDate" required type="date" onchange="window.handleTimeConstraints()" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none cursor-pointer" />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">시작 시간 <span class="text-[#FF3B30]">*</span></label>

      {author: "요하네스 케플러 (천문학자, 독일)", text: "자연은 본질적으로 수학적이다."},
      {author: "앨빈 토플러 (미래학자, 미국)", text: "21세기의 문맹은 낡은 지식을 버리지 못하는 자다."},
      {author: "프랜시스 베이컨 (철학자, 영국)", text: "독서는 완전한 사람을, 토론은 준비된 사람을 만든다."},
      {author: "마하트마 간디 (사상가, 인도)", text: "세상의 변화를 보고 싶다면 스스로 그 변화가 되어라."},
      {author: "스피노자 (철학자, 네덜란드)", text: "평화는 강인한 성품에서 비롯된 미덕이다."},
      {author: "헬렌 켈러 (저술가, 미국)", text: "혼자서는 할 수 없지만 함께라면 무엇이든 가능하다."},
      {author: "순자 (사상가, 중국)", text: "외기러기가 무리가 될 수 없고, 외나무가 숲이 될 수 없다."},
      {author: "생텍쥐페리 (소설가, 프랑스)", text: "배를 만들게 하려면 끝없는 바다를 동경하게 하라."},
      {author: "존 던 (시인, 영국)", text: "어떤 사람도 그 자체로 온전한 섬은 아니다."},
      {author: "마틴 루터 킹 (운동가, 미국)", text: "함께 형제로 사는 법을 배우지 못하면 바보로 죽는다."},
      {author: "앤드류 카네기 (기업가, 미국)", text: "함께 일하는 능력이야말로 성공의 열쇠다."},
      {author: "워런 버핏 (투자자, 미국)", text: "신용을 쌓는 데는 20년이 걸리지만 무너지는 데는 5분이면 족하다."},
      {author: "성철 (종교인, 한국)", text: "자기를 속이지 말라."},
      {author: "묵자 (사상가, 중국)", text: "서로 사랑하고 이로움을 나누어라."},
      {author: "피타고라스 (수학자, 그리스)", text: "조화는 다름의 아름다운 결합이다."},
      {author: "마르틴 부버 (철학자, 오스트리아)", text: "모든 참된 삶은 만남이다."},
      {author: "달라이 라마 (종교인, 티베트)", text: "자비심은 나침반과 같다."},
      {author: "슈바이처 (의사, 독일)", text: "타인을 돕는 자만이 진정으로 행복하다."},
      {author: "에마뉘엘 레비나스 (철학자, 프랑스)", text: "타자의 얼굴은 나에게 책임을 묻는다."},
      {author: "공자 (사상가, 중국)", text: "다름을 인정하되 같아지기를 강요하지 않는다."},
      {author: "아인슈타인 (물리학자, 미국)", text: "평화는 무력이 아니라 이해를 통해 유지된다."},
      {author: "존 듀이 (철학자, 미국)", text: "민주주의는 삶의 한 방식이다."},
      {author: "요한 피히테 (철학자, 독일)", text: "인간은 오직 인간 사이에서만 인간이 된다."},
      {author: "마르쿠스 아우렐리우스 (철학자, 로마)", text: "우리 삶은 생각의 질에 달려 있다."},
      {author: "빅터 프랭클 (의사, 오스트리아)", text: "고난에 의미를 부여할 때 고통은 사라진다."},
      {author: "틱낫한 (종교인, 베트남)", text: "현재의 순간 속에 모든 평화가 있다."},
      {author: "에픽테토스 (철학자, 로마)", text: "일어나는 일보다 어떻게 받아들이느냐가 중요하다."},
      {author: "파스칼 (수학자, 프랑스)", text: "인간의 존엄성은 사고하는 능력에 있다."},
      {author: "맹자 (사상가, 중국)", text: "하늘이 큰 임무를 내릴 때는 먼저 고난을 주신다."},
      {author: "버트런드 러셀 (철학자, 영국)", text: "희망은 어떤 상황에서도 결코 사라지지 않는다."},
      {author: "찰스 슈밥 (기업가, 미국)", text: "진심 어린 칭찬은 사람의 능력을 꽃피우게 한다."},
      {author: "헤르만 헤세 (소설가, 스위스)", text: "새는 알을 깨고 나온다. 투쟁해야 한다."},
      {author: "쇼펜하우어 (철학자, 독일)", text: "인격은 우리 안에 있는 영원한 자산이다."},
      {author: "에리히 프롬 (심리학자, 미국)", text: "자기 자신을 사랑하는 것이 진정한 사랑의 첫걸음이다."},
      {author: "노자 (사상가, 중국)", text: "남을 아는 것은 지혜롭지만, 자신을 아는 것은 깨달음이다."},
      {author: "칼 로저스 (심리학자, 미국)", text: "있는 그대로의 나를 수용할 때 내가 변화한다."},
      {author: "루미 (시인, 페르시아)", text: "우주에 있는 모든 단서를 당신 안에 있다."},
      {author: "파스칼 (수학자, 프랑스)", text: "짧은 편지를 쓸 시간이 없어서 긴 편지를 썼다."},
      {author: "장자 (사상가, 중국)", text: "쓸모없어 보이는 것이 때로는 가장 큰 쓸모가 있다."},
      {author: "마르쿠스 아우렐리우스 (철학자, 로마)", text: "내면을 들여다보라. 거기에 선의 샘이 있다."},
      {author: "지그문트 프로이트 (심리학자, 오스트리아)", text: "감정이 요동치는 곳에 이성이 자리해야 한다."},
      {author: "데일 카네기 (작가, 미국)", text: "행복은 외부의 상황이 아니라 당신의 생각에 달려 있다."},
      {author: "로버트 슐러 (종교인, 미국)", text: "불가능한 일은 없다, 불가능한 생각만 있을 뿐이다."},
      {author: "나폴레옹 (군인, 프랑스)", text: "리더는 희망을 배달하는 사람이다."},
      {author: "손무 (전략가, 중국)", text: "지피지기면 백전불태다."},
      {author: "존 맥스웰 (작가, 미국)", text: "리더는 길을 알고, 가고, 보여주는 사람이다."},
      {author: "로버트 그린리프 (경영학자, 미국)", text: "섬기는 리더십이 진정한 힘이다."},
      {author: "조지 버나드 쇼 (극작가, 아일랜드)", text: "자신을 개선하는 것이 세상을 개선하는 길이다."},
      {author: "짐 콜린스 (경영학자, 미국)", text: "좋은 것은 위대한 것의 적이다."},
      {author: "시몬 드 보부아르 (철학자, 프랑스)", text: "스스로 존재를 정의하는 것이 자유다."},
      {author: "장 자크 루소 (철학자, 프랑스)", text: "가장 유능한 사람은 가장 인내하는 사람이다."},
      {author: "윈스턴 처칠 (정치인, 영국)", text: "포기하지 마라, 절대 포기하지 마라."},
      {author: "토마스 아 켐피스 (사상가, 독일)", text: "자기 자신을 다스리는 자가 세계를 다스린다."},
      {author: "장 폴 사르트르 (철학자, 프랑스)", text: "우리는 우리의 선택에 의해 결정된다."},
      {author: "칸트 (철학자, 독일)", text: "언제나 보편적 입법의 원리가 될 수 있도록 행위하라."},
      {author: "맹자 (사상가, 중국)", text: "부끄러움을 아는 마음이 의로움의 시작이다."},
      {author: "존 스튜어트 밀 (철학자, 영국)", text: "다른 사람에게 해를 끼치지 않는 한 인간은 완전히 자유롭다."},
      {author: "막스 베버 (사회학자, 독일)", text: "책임 윤리는 결과에 대한 책임을 지는 것이다."},
      {author: "한나 아렌트 (철학자, 미국)", text: "악의 평범성은 생각하지 않음에서 온다."},
      {author: "공자 (사상가, 중국)", text: "잘못을 알고도 고치지 않는 것이 진정한 잘못이다."},
      {author: "에드먼드 버크 (정치인, 영국)", text: "자유는 언제나 책임과 짝을 이룬다."},
      {author: "아담 스미스 (경제학자, 영국)", text: "타인의 감정에 동감하는 능력이 도덕의 기초다."},
      {author: "토마스 제퍼슨 (정치인, 미국)", text: "정직은 지혜라는 책의 첫 번째 장이다."},
      {author: "스티 잡스 (기업가, 미국)", text: "갈망하라, 우직하게 나아가라."},
      {author: "알베르트 아인슈타인 (물리학자, 미국)", text: "상상력이 지식보다 중요하다."},
      {author: "토마스 에디슨 (발명가, 미국)", text: "천재는 1% 영감과 99% 노력으로 만들어진다."},
      {author: "프랜시스 베이컨 (철학자, 영국)", text: "아는 것이 힘이다."},
      {author: "조셉 슘페터 (경제학자, 오스트리아)", text: "창조적 파괴가 혁신의 본질이다."},
      {author: "파블로 피카소 (화가, 스페인)", text: "모든 창조는 파괴에서 시작된다."},
      {author: "에이브러햄 매슬로 (심리학자, 미국)", text: "도구가 망치뿐이면 모든 문제를 못으로 본다."},
      {author: "칼 포퍼 (철학자, 영국)", text: "우리는 무지를 통해 지혜에 도달한다."},
      {author: "말콤 글래드웰 (작가, 캐나다)", text: "일만 시간의 법칙을 믿으라."},
      {author: "하워드 가드너 (심리학자, 미국)", text: "인간의 지능은 다각도로 존재한다."},
      {author: "윌리엄 깁슨 (소설가, 미국)", text: "미래는 이미 와 있다. 널리 퍼지지 않았을 뿐이다."},
      {author: "미하일 고르바초프 (정치인, 러시아)", text: "늦게 오는 자는 역사가 처벌한다."},
      {author: "막스 베버 (사회학자, 독일)", text: "혁신은 일상의 단호한 파괴에서 온다."},
      {author: "랄프 에머슨 (사상가, 미국)", text: "낡은 껍질을 벗어야 새살이 돋는다."},
      {author: "빌 게이츠 (기업가, 미국)", text: "가장 불만족스러운 고객이 위대한 배움의 원천이다."},
      {author: "벤저민 디즈레일리 (정치인, 영국)", text: "변화는 피할 수 없다. 변화는 생명이다."},
      {author: "피터 드러커 (경영학자, 미국)", text: "변화를 주도하지 않으면 변화당한다."},
      {author: "존 F. 케네디 (정치인, 미국)", text: "변화는 삶의 법칙이다."},
      {author: "제임스 (심리학자, 미국)", text: "진리는 유용한 것이다."},
      {author: "에디슨 (발명가, 미국)", text: "가장 못난 변명은 '시간이 없어서'다."},
      {author: "오비디우스 (시인, 로마)", text: "바위를 뚫는 것은 물방울의 힘이 아니라 꾸준함이다."},
      {author: "호라티우스 (시인, 로마)", text: "오늘을 잡아라."},
      {author: "레프 톨스토이 (소설가, 러시아)", text: "세상에서 가장 중요한 시간은 바로 지금이다."},
      {author: "미켈란젤로 (미술가, 이탈리아)", text: "아직도 나는 배우고 있다."},
      {author: "한나 아렌트 (철학자, 미국)", text: "인간의 본질은 시작하는 능력에 있다."},
      {author: "프리드리히 실러 (시인, 독일)", text: "시간을 아끼는 자가 승리한다."},
      {author: "볼테르 (철학자, 프랑스)", text: "노동은 권태, 부도덕, 결핍의 악을 멀리하게 한다."},
      {author: "아우구스티누스 (신학자, 로마)", text: "희망은 분노와 용기라는 두 딸을 두었다."},
      {author: "에리히 프롬 (심리학자, 미국)", text: "소유보다 존재에 집중하라."},
      {author: "미셸 푸코 (철학자, 프랑스)", text: "지식은 지배 수단이 아니라 해방 도구다."},
      {author: "찰스 슐츠 (만화가, 미국)", text: "어제는 역사, 내일은 미스터리, 오늘은 선물이다."},
      {author: "라이너 마리아 릴케 (시인, 오스트리아)", text: "당신의 일상을 사랑하라."},
      {author: "세네카 (철학자, 로마)", text: "인생은 짧은 것이 아니라 우리가 낭비하는 것이다."},
      {author: "가브리엘 마르셀 (철학자, 프랑스)", text: "존재한다는 것은 참여한다는 것이다."},
      {author: "폴 틸리히 (신학자, 독일)", text: "진정으로 존재하려는 용기가 필요하다."},
      {author: "루시우스 세네카 (철학자, 로마)", text: "훌륭하게 살기 위해 태어났다."},
      {author: "키르케고르 (철학자, 덴마크)", text: "인생은 풀어야 할 문제가 아니라 경험해야 할 현실이다."},
      {author: "하이데거 (철학자, 독일)", text: "언어는 존재의 집이다."},
      {author: "헨리 데이비드 소로 (사상가, 미국)", text: "인생의 골수까지 빨아먹고 싶었다."},
      {author: "메를로퐁티 (철학자, 프랑스)", text: "우리는 항상 세계 속에 있다."},
      {author: "넬슨 만델라 (정치인, 남아공)", text: "가장 큰 영광은 일어서는 것이다."},
      {author: "서머싯 몸 (소설가, 영국)", text: "고통은 사람을 강하게 만들거나 부러뜨린다."},
      {author: "오프라 윈프리 (방송인, 미국)", text: "실패는 성공으로 가는 이정표일 뿐이다."},
      {author: "월트 디즈니 (기업가, 미국)", text: "꿈꿀 수 있다면 이룰 수 있다."},
      {author: "에드먼드 힐러리 (탐험가, 뉴질랜드)", text: "우리가 정복하는 것은 산이 아니라 우리 자신이다."},
      {author: "율리우스 카이사르 (정치인, 로마)", text: "주사위는 던져졌다."},
      {author: "마크 트웨인 (소설가, 미국)", text: "20년 뒤 당신은 하지 않은 일에 더 후회할 것이다."},
      {author: "제인 구달 (동물학자, 영국)", text: "모든 생명은 연결되어 있으며 각자가 차이를 만든다."},
      {author: "조앤 롤링 (소설가, 영국)", text: "밑바닥은 내 인생을 다시 세울 단단한 기반이 되었다."},
      {author: "찰스 디킨스 (소설가, 영국)", text: "남의 짐을 덜어주는 자는 결코 쓸모없는 인간이 아니다."},
      {author: "에픽테토스 (철학자, 로마)", text: "어떤 위대한 것도 하루아침에 만들어지지 않는다."},
      {author: "헬렌 켈러 (저술가, 미국)", text: "성격은 쉽고 조용하게 개발될 수 없다."},

    const formatDateForInput = (date) => { 
      const y = date.getFullYear(); 
      const m = String(date.getMonth() + 1).padStart(2, '0'); 
      const d = String(date.getDate()).padStart(2, '0'); 
      return `${y}-${m}-${d}`; 
    };
    
    const formatShortDate = (dateString) => { 
      const date = new Date(dateString); 
      const days = ['일', '월', '화', '수', '목', '금', '토']; 
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`; 
    };
    
    const formatTaskDateRange = (start, end) => { 
      if (start === end) return formatShortDate(start); 
      return `${formatShortDate(start)}~${formatShortDate(end)}`; 
    };
    
    const isSameDate = (d1, d2) => { 
      if (!d1 || !d2) return false; 
      return d1.toDateString() === d2.toDateString(); 
    };
    
    const getFilteredTasks = () => { 
      return tasks.filter(task => { 
        const matchTeam = filterTeam === 'all' || task.teamId === filterTeam; 
        const searchLower = searchQuery.toLowerCase(); 
        const matchSearch = task.title.toLowerCase().includes(searchLower) || task.assignee.toLowerCase().includes(searchLower); 
        return matchTeam && matchSearch; 
      }); 
    };

    // 명언 애니메이션 로직
    function startQuoteRotation() {
      const container = document.getElementById('quote-container');
      const textEl = document.getElementById('quote-text');
      const authorEl = document.getElementById('quote-author');
      if (!container) return;
      
      currentQuoteIndex = Math.floor(Math.random() * QUOTES.length);
      
      const updateQuote = () => {
        container.classList.remove('opacity-100');
        container.classList.add('opacity-0');
        
        setTimeout(() => {
          const q = QUOTES[currentQuoteIndex];
          textEl.innerText = `\u201c${q.text}\u201d`;
          authorEl.innerText = `\u2014 ${q.author}`;
          
          currentQuoteIndex = (currentQuoteIndex + 1) % QUOTES.length;
          
          container.classList.remove('opacity-0');
          container.classList.add('opacity-100');
        }, 700); 
      };
      
      updateQuote();
      setInterval(updateQuote, 10000);
    }

    window.checkAndSendReminders = function(currentTasks) {
      // 다중 사용자가 동시에 접속했을 때의 충돌을 방지하기 위해 약간의 랜덤 지연시간 부여

        try {
          const todayStr = formatDateForInput(new Date());

          // 이미 누군가의 접속에 의해 오늘 리마인드가 발송되었다면 중단

            return;

          // 낙관적 락: 내가 발송 처리를 시작함을 즉시 기록
          await setDoc(reminderRef, { lastSentDate: todayStr });
          console.log("오늘자 자동 리마인드 메일 발송 프로세스 시작...");

          // 내일 날짜 계산
          const tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          const tomorrowStr = formatDateForInput(tomorrow);

          // 내일에 해당하는 일정만 필터링
          const tomorrowTasks = currentTasks.filter(t => t.startDate <= tomorrowStr && t.endDate >= tomorrowStr);
          
          for (const task of tomorrowTasks) {
            let targetEmail = null;
            let targetName = "담당자";

            // 스마트 이름 추출 및 이메일 매칭
            if (task.teamId === 't5') {
              targetEmail = "jwkim0732@hd.com"; // 김진위 수석(담당임원)
              targetName = "김진위";
            } else if (task.assignee) {
              for (const [email, fullName] of Object.entries(USER_EMAILS)) {
                const nameOnly = fullName.split(' ')[0]; // "하다윤 책임" -> "하다윤"
                if (task.assignee.includes(nameOnly)) {
                  targetEmail = email;
                  targetName = nameOnly;
                  break;
                }
              }
            }

            // 발송 대상이 있고, 메일 API가 정상적으로 설정된 경우에만 발송
            if (targetEmail && window.EMAIL_API_URL && window.EMAIL_API_URL !== "여기에_구글_앱스_스크립트_URL_입력") {
              const typeLabel = task.type === 'section' ? '과단위 업무' : (task.type === 'department' ? '부서단위 업무' : '개인별 업무');

              const dateRange = task.startDate !== task.endDate ? `${task.startDate} ~ ${task.endDate}` : task.startDate;
              
              const body = `안녕하세요, ${targetName} 님!\n동반성장부 워크스페이스 알림봇입니다. 🤖\n\n내일 진행 예정인 업무 일정이 있어 미리 안내해 드립니다.\n\n📌 [내일의 일정 안내]\n* 업무 제목: ${task.title}\n* 일시: ${dateRange} (${task.startTime} ~ ${task.endTime})\n* 장소: ${task.location || '미지정'}\n* 구분: ${typeLabel}\n\n📝 [업무 상세 내용]\n${task.description || '상세 내용 없음'}\n\n--------------------------------------------------\n내일도 활기차고 성공적인 하루 보내시길 응원합니다! 파이팅! ☕\n\n* 본 메일은 동반성장부 통합 워크스페이스 시스템에 의해 첫 접속 시 자동 발송되었습니다.`;

              // 백그라운드 발송 (await 처리 없이 비동기로 넘김)
              fetch(window.EMAIL_API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },

                  to: targetEmail,

                  subject: subject, 
                  body: body 
                }) 
              }).catch(e => console.error("리마인드 메일 발송 에러", e));
            }
          }
        } catch (e) {
          console.error("자동 리마인드 처리 중 오류:", e);
        }
      }, Math.random() * 2000 + 1000); 
    };

      } else if (type === 'error') {

      } else {

      toast.innerHTML = `<div class="p-1 rounded-full ${bgClass} ${textClass}"><i data-feather="${icon}" class="w-4 h-4"></i></div><span class="text-[14px] font-bold text-[#1D1D1F] pr-2">${message}</span>`;
      container.appendChild(toast);

          popover.style.left = '50%'; 
          popover.style.top = '50%'; 
          popover.style.transform = 'translate(-50%, -50%)'; 
        } else { 
          let top = rect.top; 
          let left = rect.left + rect.width + 10; 
          if (left + 256 > window.innerWidth) left = rect.left - 256 - 10; 
          popover.style.left = left + 'px'; 
          popover.style.top = top + 'px'; 
          popover.style.transform = 'none'; 
        }

        window.openModal(new Date(dateStr));

      lastClickTime = now; 
      lastClickDate = dateStr;

      const currentEndVal = document.getElementById('f_endTime').value;

    window.sendBirthdayMessage = async function(name, title) {
      window.hideGiftMenu();
      
      // 생일 3일 전~후 체크 로직
      const bdayPerson = BIRTHDAYS.find(b => b.name === name);
      if (bdayPerson) {
        const today = new Date();
        const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        
        const bdayMonth = parseInt(bdayPerson.date.substring(5, 7), 10) - 1; // 0-indexed month
        const bdayDay = parseInt(bdayPerson.date.substring(8, 10), 10);
        
        // 해당 직원의 올해, 작년, 내년 생일 날짜 세팅 (연말/연초 등 해가 바뀌는 구간 대응)
        const bdayThisYear = new Date(today.getFullYear(), bdayMonth, bdayDay);
        const bdayLastYear = new Date(today.getFullYear() - 1, bdayMonth, bdayDay);
        const bdayNextYear = new Date(today.getFullYear() + 1, bdayMonth, bdayDay);

        // 오늘과 가장 가까운 생일 차이 찾기
        const diffThis = (todayDate - bdayThisYear) / (1000 * 60 * 60 * 24);
        const diffLast = (todayDate - bdayLastYear) / (1000 * 60 * 60 * 24);
        const diffNext = (todayDate - bdayNextYear) / (1000 * 60 * 60 * 24);

        let diffDays = diffThis;
        if (Math.abs(diffLast) < Math.abs(diffDays)) diffDays = diffLast;
        if (Math.abs(diffNext) < Math.abs(diffDays)) diffDays = diffNext;

        // diffDays가 음수이면 생일 전, 양수이면 생일 지남
        if (diffDays < -3) {
          showToast('아직 생일 기간이 아닙니다. (생일 3일 전부터 가능) 😉', 'info');
          return;
        } else if (diffDays > 3) {
          showToast('올해 생일 기간이 이미 지났습니다. 마음만 전해주세요! 😅', 'info');
          return;
        }
      }

      const fullNameTitle = `${name} ${title}`;
      
      // USER_EMAILS 목록에서 해당 직원의 이메일을 역추적하여 찾기
      let targetEmail = null;
      for (const [email, userFullName] of Object.entries(USER_EMAILS)) {
        if (userFullName === fullNameTitle) {
          targetEmail = email;
          break;
        }
      }

      if (!targetEmail) {
        showToast(`${fullNameTitle}님의 이메일 정보를 찾을 수 없습니다.`, 'error');
        return;
      }

      if (!window.EMAIL_API_URL || window.EMAIL_API_URL === "여기에_구글_앱스_스크립트_URL_입력") {
        showToast('메일 전송 서버가 아직 설정되지 않았습니다.', 'error');
        return;
      }

      const subject = `[HD현대삼호 동반성장부] ${fullNameTitle}님, 생일을 진심으로 축하합니다! 🎉`;
      const body = `${fullNameTitle}님, 생일을 진심으로 축하합니다!\n\n오늘 하루 세상에서 가장 행복하고 특별한 하루 보내시길 바랍니다.\n항상 동반성장부를 위해 애써주셔서 감사합니다.\n\n--------------------------------------------\n* 본 메일은 동반성장부 통합 워크스페이스에서 동료의 마음을 담아 자동 발송되었습니다.`;

      try {
        const response = await fetch(window.EMAIL_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            to: targetEmail,
            replyTo: currentUser ? currentUser.email : "no-reply@hd.com",
            senderName: "동반성장부 동료 일동",
            subject: subject,
            body: body
          })
        });

        if (response.ok) {
          showToast(`${fullNameTitle}님께 축하메시지가 보내졌습니다! 💌`, 'success');
        } else {
          throw new Error('서버 응답 오류');
        }
      } catch (error) {
        console.error("메일 발송 실패:", error);
        showToast('축하메시지 발송 중 오류가 발생했습니다.', 'error');
      }
    };

    // 캘린더 그리드 렌더링
    function renderCalendar() {
      const year = currentDate.getFullYear(); 
      const month = currentDate.getMonth();
      document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;
      
      let legendsHtml = ''; 
      TEAMS.forEach(team => { 
        legendsHtml += `<span class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full" style="background-color:${team.hex}"></div> ${team.name}</span>`; 
      });
      document.getElementById('calendar-legends').innerHTML = legendsHtml;
      
      // 이달의 생일자 (상단 헤더 전용, 티파니 블루 테마)
      const currentMonthBirthdays = BIRTHDAYS.filter(b => parseInt(b.date.substring(5, 7)) === month + 1)
                                             .sort((a,b) => parseInt(a.date.substring(8, 10)) - parseInt(b.date.substring(8, 10)));
      const bdayContainer = document.getElementById('month-birthdays');
      if (currentMonthBirthdays.length > 0) {
          let bdayTextHtml = '';
          if (currentMonthBirthdays.length <= 2) {
              bdayTextHtml = currentMonthBirthdays.map(b => 
                `<span class="cursor-pointer hover:text-[#0F766E] hover:underline transition-colors inline-block" onclick="window.showGiftMenu(event, '${b.name}', '${b.title}')">${b.name} ${b.title}(${parseInt(b.date.substring(8, 10))}일)</span>`
              ).join(', ');
          } else {
              const firstLine = currentMonthBirthdays.slice(0, 2).map(b => 
                `<span class="cursor-pointer hover:text-[#0F766E] hover:underline transition-colors inline-block" onclick="window.showGiftMenu(event, '${b.name}', '${b.title}')">${b.name} ${b.title}(${parseInt(b.date.substring(8, 10))}일)</span>`
              ).join(', ') + ', ';
              const secondLine = currentMonthBirthdays.slice(2).map(b => 
                `<span class="cursor-pointer hover:text-[#0F766E] hover:underline transition-colors inline-block" onclick="window.showGiftMenu(event, '${b.name}', '${b.title}')">${b.name} ${b.title}(${parseInt(b.date.substring(8, 10))}일)</span>`
              ).join(', ');
              
              bdayTextHtml = `${firstLine}<br/>${secondLine}`;
          }
          
          const bdayPlain = currentMonthBirthdays.map(b => `${b.name} ${b.title}(${parseInt(b.date.substring(8, 10))}일)`).join(', ');
          
          bdayContainer.innerHTML = `
            <span class="shrink-0 font-extrabold text-[12.5px] pt-px mr-1">🎂 이달의 생일자:</span>
            <div id="bday-text-span" class="font-extrabold leading-[1.6] text-[12.5px] break-keep flex-1 min-w-0">${bdayTextHtml}</div>
          `;
          bdayContainer.title = `🎂 이달의 생일자: ${bdayPlain}`;
          bdayContainer.style.display = '';

          setTimeout(() => {
              const textSpan = document.getElementById('bday-text-span');
              if (textSpan) {
                  let size = 12.5;
                  textSpan.style.fontSize = size + 'px';
                  while (textSpan.scrollWidth > textSpan.clientWidth && size > 9.5) {
                      size -= 0.5;
                      textSpan.style.fontSize = size + 'px';
                  }
              }
          }, 10);
      } else {
          bdayContainer.style.display = 'none';
      }

      const firstDay = new Date(year, month, 1).getDay(); 
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const today = new Date(); 
      const filtered = getFilteredTasks();
      
      let gridHtml = '';
      
      for (let i = 0; i < 42; i++) {
        const dayNum = i - firstDay + 1; 
        const isCurrentMonth = dayNum > 0 && dayNum <= daysInMonth;
        const cellDate = isCurrentMonth ? new Date(year, month, dayNum) : null;
        const cellDateStr = cellDate ? formatDateForInput(cellDate) : '';
        const isSelected = isSameDate(cellDate, window.selectedDate);
        const holidayName = isCurrentMonth ? HOLIDAYS[cellDateStr] : null;
        const isRed = isCurrentMonth && (i % 7 === 0 || holidayName);
        const isSat = i % 7 === 6;
        
        let cellClasses = `relative border-r border-b border-gray-200 transition-colors p-1.5 flex flex-col h-full overflow-hidden ${isCurrentMonth ? 'bg-white hover:bg-gray-50 cursor-pointer' : 'bg-[#F9F9FB] text-black/15'}`;
        if (isSelected && isCurrentMonth) cellClasses += ` ring-2 ring-inset ring-[#007AFF] z-10 bg-[#007AFF]/5 rounded-[4px]`;
        
        let cellContent = '';
        if (isCurrentMonth) {
          let dayTasks = filtered.filter(t => t.startDate <= cellDateStr && t.endDate >= cellDateStr).sort((a,b) => a.startTime.localeCompare(b.startTime));
          
          let numColorClass = 'text-[#1D1D1F]';
          if (isRed) numColorClass = 'text-[#FF3B30]';
          else if (isSat) numColorClass = 'text-[#007AFF]';

          const numDisplay = isSameDate(cellDate, today) ? `<span class="bg-[#007AFF] w-6 h-6 flex items-center justify-center rounded-full shadow-md text-white font-bold">${dayNum}</span>` : `<span class="w-6 h-6 flex items-center justify-center font-bold ${numColorClass}">${dayNum}</span>`;
          const holidayLabel = holidayName ? `<span class="absolute top-1.5 right-1.5 text-[10px] font-bold text-[#FF3B30] bg-white/60 px-1 rounded">${holidayName}</span>` : '';
          
          let tasksHtml = `<div class="flex items-start w-full h-full relative z-20 pt-[2px]"><div class="w-[26px] shrink-0"></div><div class="flex flex-col gap-1 flex-1 min-w-0">`;
          const visibleLimit = 4;
          
          if (dayTasks.length > 0) {
            if (dayTasks.length <= visibleLimit) { 
              dayTasks.forEach(t => { 
                const team = TEAMS.find(x => x.id === t.teamId); 
                tasksHtml += `<div class="w-full bg-white rounded-[4px] shadow-sm border ${team.border} ${team.bg} ${team.text} px-1.5 py-0.5 text-[10px] sm:text-[11px] font-bold truncate leading-tight hover:opacity-80 transition-opacity cursor-pointer" ondblclick="event.stopPropagation(); window.openEditTaskModal('${t.id}')">${t.title}</div>`; 
              }); 
            } else { 
              for(let j=0; j<visibleLimit-1; j++) { 
                const t = dayTasks[j]; 
                const team = TEAMS.find(x => x.id === t.teamId); 
                tasksHtml += `<div class="w-full bg-white rounded-[4px] shadow-sm border ${team.border} ${team.bg} ${team.text} px-1.5 py-0.5 text-[10px] sm:text-[11px] font-bold truncate leading-tight hover:opacity-80 transition-opacity cursor-pointer" ondblclick="event.stopPropagation(); window.openEditTaskModal('${t.id}')">${t.title}</div>`; 
              }
              const lastT = dayTasks[visibleLimit-1]; 
              const lastTeam = TEAMS.find(x => x.id === lastT.teamId);
              tasksHtml += `<div class="flex items-center gap-1 w-full"><div class="flex-1 min-w-0 bg-white rounded-[4px] shadow-sm border ${lastTeam.border} ${lastTeam.bg} ${lastTeam.text} px-1.5 py-0.5 text-[10px] sm:text-[11px] font-bold truncate leading-tight cursor-pointer" ondblclick="event.stopPropagation(); window.openEditTaskModal('${lastT.id}')">${lastT.title}</div><div onclick="window.showDayPopover(event, '${cellDateStr}')" class="shrink-0 bg-white border border-gray-300 px-1.5 py-0.5 rounded-[4px] text-[9px] font-bold text-center text-[#48484A] hover:bg-[#007AFF] hover:text-white transition-all shadow-sm cursor-pointer">+${dayTasks.length-visibleLimit}</div></div>`;
            }
          }
          tasksHtml += `</div></div>`;
          cellContent = `<div class="absolute top-1.5 left-1.5 z-10">${numDisplay}</div>` + holidayLabel + tasksHtml;
        } else {
          cellContent = `<div class="text-[14px] md:text-[15px] font-bold p-1">${dayNum > 0 ? dayNum : ''}</div>`;
        }
        
        const onClickAttr = isCurrentMonth ? `onclick="window.handleCellClick(event, '${cellDateStr}')"` : '';
        gridHtml += `<div class="${cellClasses}" ${onClickAttr}>${cellContent}</div>`;
      }
      document.getElementById('calendar-grid').innerHTML = gridHtml;
    }

    // 상세 일정 리스트 (우측 패널)
    function renderDailyFocus() {
      const dateStr = formatDateForInput(window.selectedDate);
      const isHol = HOLIDAYS[dateStr];
      const titleEl = document.getElementById('daily-focus-title');
      
      titleEl.innerHTML = `${window.selectedDate.getMonth()+1}월 ${window.selectedDate.getDate()}일 ${isHol?`<span class="ml-2 text-[#FF3B30] text-[11px] font-bold">(${isHol})</span>`:''}`;
      
      let dayTasks = getFilteredTasks().filter(t => t.startDate <= dateStr && t.endDate >= dateStr).sort((a,b) => a.startTime.localeCompare(b.startTime));
      
      if (window.selectedTaskId) {
        dayTasks = dayTasks.filter(t => t.id === window.selectedTaskId);
      }

      let html = dayTasks.length ? '' : `<div class="h-full flex flex-col items-center justify-center text-[#86868B] py-10"><i data-feather="calendar" class="w-8 h-8 mb-2 opacity-50"></i><p class="font-bold text-[14px]">일정 없음</p></div>`;
      
      dayTasks.forEach(t => {
        const team = TEAMS.find(x => x.id === t.teamId);
        const icon = (t.type==='section'?'users':(t.type==='department'?'briefcase':'user'));
        const typeLabel = (t.type==='section'?'과단위':(t.type==='department'?'부서단위':'개인별'));
        const dblClick = `ondblclick="window.openEditTaskModal('${t.id}')"`;
        const cursorCls = 'hover:shadow-md transition-all cursor-pointer group';

        html += `
          <div ${dblClick} class="bg-white rounded-[14px] p-3 shadow-sm relative overflow-hidden border border-gray-200 select-none ${cursorCls}">
            <div class="absolute left-0 top-0 bottom-0 w-1" style="background-color:${team.hex}"></div>
            <div class="pl-2 flex flex-col gap-1.5">
              <div class="flex justify-between items-start">
                <h4 class="font-bold text-[14px] text-[#1D1D1F] leading-tight flex items-center gap-1.5">${t.title} ${t.isFocus?'<i data-feather="star" class="w-3.5 h-3.5 text-[#FF9500] fill-[#FF9500] mb-px"></i>':''}</h4>
                <span class="text-[10px] font-bold px-1.5 py-0.5 rounded-[4px] ${team.bg} ${team.text} border ${team.border} whitespace-nowrap">${team.name}</span>
              </div>
              <div class="flex flex-wrap items-center gap-x-3 gap-y-1.5 text-[12px] font-bold text-[#48484A]">
                <span class="flex items-center gap-1 bg-gray-50 px-1.5 py-0.5 rounded-[4px] border border-gray-100"><i data-feather="clock" class="w-3 h-3"></i> ${t.startTime}${t.endTime?`~${t.endTime}`:''}</span>
                ${t.location?`<span class="flex items-center gap-1"><i data-feather="map-pin" class="w-3 h-3"></i> ${t.location}</span>`:''}
                <span class="flex items-center gap-1 text-[#1D1D1F]"><i data-feather="${icon}" class="w-3 h-3 text-[#48484A]"></i> ${t.assignee} <span class="font-medium text-[10px] text-[#86868B]">(${typeLabel})</span></span>
              </div>
              ${t.description?`<div class="mt-0.5 text-[12px] text-[#3A3A3C] bg-[#F9F9FB] px-2.5 py-2 rounded-[8px] leading-relaxed font-medium whitespace-pre-wrap border border-gray-100">${t.description}</div>`:''}
            </div>
          </div>`;
      });
      document.getElementById('daily-focus-list').innerHTML = html; 
      feather.replace();
    }

    /* ========================================================================== */
    /* 7. 데이터 조작 및 핸들러 함수들                                            */
    /* ========================================================================== */
    
    window.setFilter = (id) => { filterTeam = id; updateAll(); };
    window.handleToday = () => { currentDate = new Date(); window.selectedDate = new Date(); updateAll(); };
    window.handlePrevMonth = () => { currentDate.setMonth(currentDate.getMonth()-1); updateAll(); };
    window.handleNextMonth = () => { currentDate.setMonth(currentDate.getMonth()+1); updateAll(); };
    window.handleSearch = (val) => { searchQuery = val; updateAll(); };
    window.handleFocusTaskClick = (id, date) => { window.selectedDate = new Date(date); window.selectedTaskId = id; updateAll(); };

    window.openModal = function(dateObj = new Date()) {
      currentEditTaskId = null; 
      document.getElementById('taskForm').reset();
      document.getElementById('modal-title').innerText = "새로운 일정";
      
      const f = ['title','type','teamId','assignee','location','startDate','endDate','description'];
      f.forEach(k => document.getElementById('f_'+k).disabled = false);
      
      document.getElementById('f_isFocus').disabled = false;
      document.getElementById('f_startDate').value = formatDateForInput(dateObj);
      document.getElementById('f_endDate').value = formatDateForInput(dateObj);
      document.getElementById('btn_delete').classList.add('hidden');
      document.getElementById('taskModal').classList.remove('hidden');
      
      renderTimeDropdown('start', timeOptions);
      document.getElementById('f_startTime').value = "08:00";
      window.handleTimeConstraints();
      document.getElementById('f_endTime').value = "17:00";
      document.getElementById('email_action_container').classList.add('hidden');
      window.handleTeamChange();
    };

    window.openEditTaskModal = function(id) {
      currentEditTaskId = id; 
      const task = tasks.find(x => x.id === id); 
      if(!task) return;
      
      const isCreator = task.creatorEmail === currentUser.email;
      document.getElementById('modal-title').innerText = isCreator ? "일정 편집" : "일정 상세";
      renderTimeDropdown('start', timeOptions);
      
      const f = ['title','type','teamId','assignee','location','startDate','endDate','startTime','endTime','description'];
      f.forEach(k => { 
        const el = document.getElementById('f_'+k); 
        el.value = task[k]||''; 
        el.disabled = !isCreator; 
      });
      
      document.getElementById('f_isFocus').checked = !!task.isFocus;
      document.getElementById('f_isFocus').disabled = !isCreator;
      window.handleTimeConstraints();
      
      document.getElementById('taskModal').classList.remove('hidden');
      document.getElementById('btn_submit').classList.toggle('hidden', !isCreator);
      document.getElementById('btn_delete').classList.toggle('hidden', !isCreator);
      
      const emailCont = document.getElementById('email_action_container');
      if (!isCreator && task.creatorEmail) { 
        emailCont.classList.remove('hidden'); 
        document.getElementById('email_active_view').classList.remove('hidden'); 
        document.getElementById('email_legacy_view').classList.add('hidden'); 
      } else if (!isCreator) { 
        emailCont.classList.remove('hidden'); 
        document.getElementById('email_active_view').classList.add('hidden'); 
        document.getElementById('email_legacy_view').classList.remove('hidden'); 
      } else {
        emailCont.classList.add('hidden');
      }
      window.handleTeamChange();
    };

    window.closeModal = () => document.getElementById('taskModal').classList.add('hidden');

    window.handleTaskSubmit = async function(e) {
      e.preventDefault();
      const data = {
        title: document.getElementById('f_title').value,
        type: document.getElementById('f_type').value,
        teamId: document.getElementById('f_teamId').value,
        assignee: document.getElementById('f_assignee').value,
        location: document.getElementById('f_location').value,
        startDate: document.getElementById('f_startDate').value,
        endDate: document.getElementById('f_endDate').value,
        startTime: document.getElementById('f_startTime').value,
        endTime: document.getElementById('f_endTime').value,
        description: document.getElementById('f_description').value,
        isFocus: document.getElementById('f_isFocus').checked,
        creatorEmail: currentUser.email
      };
      
      const tid = currentEditTaskId || Date.now().toString();
      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks', tid), { ...data, id: tid });
      showToast(currentEditTaskId ? '수정되었습니다.' : '등록되었습니다.'); 
      window.closeModal();
    };

    window.handleDeleteBtnClick = async function() {
      if (!isDeleteConfirming) { 
        isDeleteConfirming = true; 
        const b = document.getElementById('btn_delete'); 
        b.innerText = "확인"; 
        b.className = "px-4 py-2.5 rounded-[10px] text-white bg-[#FF3B30] font-bold"; 
        return; 
      }
      await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks', currentEditTaskId));
      showToast('삭제되었습니다.'); 
      isDeleteConfirming = false; 
      window.closeModal();
    };

    window.handleTeamChange = function() {
      const teamId = document.getElementById('f_teamId').value;
      const assigneeInput = document.getElementById('f_assignee');
      const asterisk = document.getElementById('assignee_asterisk');
      if (teamId === 't5') { 
        assigneeInput.required = false; 
        asterisk.style.display = 'none'; 
      } else { 
        assigneeInput.required = true; 
        asterisk.style.display = 'inline'; 
      }
    };

    window.handleLogin = async (e) => { 
      e.preventDefault(); 
      try { 
        await signInWithEmailAndPassword(auth, document.getElementById('login_email').value, document.getElementById('login_password').value); 
        showToast('반갑습니다!'); 
      } catch(err) { 
        showToast('정보가 올바르지 않습니다.', 'error'); 
      } 
    };
    
    window.handleLogout = () => signOut(auth);
    window.openPasswordModal = () => document.getElementById('passwordModal').classList.remove('hidden');
    window.closePasswordModal = () => document.getElementById('passwordModal').classList.add('hidden');

    window.handlePasswordChange = async function(e) {
      e.preventDefault();
      const email = document.getElementById('pwd_email').value;
      const oldPwd = document.getElementById('pwd_old').value;
      const newPwd = document.getElementById('pwd_new').value;
      const confirmPwd = document.getElementById('pwd_confirm').value;

      if (newPwd !== confirmPwd) {
        showToast('새 비밀번호가 일치하지 않습니다.', 'error');
        return;
      }
      if (newPwd.length < 6) {
        showToast('비밀번호는 6자리 이상이어야 합니다.', 'error');
        return;
      }

      const btn = document.getElementById('btn_change_pwd');
      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i data-feather="loader" class="w-4 h-4 spin-slow"></i> 변경 중...`;
      feather.replace();

      window.isPasswordChanging = true; 

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, oldPwd);
        await updatePassword(userCredential.user, newPwd);
        await signOut(auth);

        showToast('비밀번호가 성공적으로 변경되었습니다. 새 비밀번호로 로그인해주세요.', 'success');
        window.closePasswordModal();
      } catch (error) {
        if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          showToast('등록되지 않은 이메일이거나 현재 비밀번호가 틀렸습니다.', 'error');
        } else {
          showToast('비밀번호 변경 중 오류가 발생했습니다. (' + error.code + ')', 'error');
        }
      } finally {
        window.isPasswordChanging = false;
        btn.disabled = false;
        btn.innerHTML = originalHtml;
        feather.replace();
      }
    };

    window.sendEmail = async function() {
      const task = tasks.find(x => x.id === currentEditTaskId);
      const content = document.getElementById('email_content').value.trim();
      
      if (!content) { 
        showToast('내용을 입력해주세요.', 'error'); 
        return; 
      }
      
      const senderDisplay = USER_EMAILS[currentUser.email.toLowerCase()] ? `${currentUser.email}(${USER_EMAILS[currentUser.email.toLowerCase()]})` : currentUser.email;
      const body = `[업무명: ${task.title}]\n\n${content}\n\n* 발신자: ${senderDisplay}`;
      
      try {
        await fetch(window.EMAIL_API_URL, { 
          method: 'POST', 
          body: JSON.stringify({ to: task.creatorEmail, subject: "업무 코멘트", body: body }) 
        });
        showToast('메일이 발송되었습니다.'); 
        document.getElementById('email_form').classList.add('hidden');
      } catch(e) { 
        showToast('발송 실패', 'error'); 
      }
    };

    window.toggleEmailForm = () => document.getElementById('email_form').classList.toggle('hidden');

    document.addEventListener('DOMContentLoaded', () => {
      const select = document.getElementById('f_teamId');
      TEAMS.forEach(t => select.add(new Option(t.name, t.id)));
      updateSyncStatus('loading');
    });

    document.addEventListener('click', (e) => {
      const p = document.getElementById('calendar-popover'); 
      if (!p.classList.contains('hidden') && !p.contains(e.target)) {
        window.closeDayPopover();
      }
      
      const d1 = document.getElementById('dropdown_startTime'); 
      const d2 = document.getElementById('dropdown_endTime');
      if (d1 && !e.target.closest('.relative')) d1.classList.add('hidden'); 
      if (d2 && !e.target.closest('.relative')) d2.classList.add('hidden');
      
      // 기프티콘 페이크 메뉴 외부 클릭 시 닫기
      window.hideGiftMenu();
    });
  </script>
</body>
</html>
