<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD현대삼호 동반성장부 통합 업무 워크스페이스</title>
 
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
 
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
 
  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    /* 미니멀 커스텀 스크롤바 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }
   
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 트랜지션 및 애니메이션 설정 */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animation-fade-in {
      animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast-enter {
      animation: slideInRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
   
    .spin-slow {
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="min-h-screen bg-[#F2F2F7] text-[#1D1D1F] flex flex-col relative selection:bg-[#007AFF]/20 selection:text-[#007AFF] overflow-x-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Pretendard', system-ui, sans-serif;">

  <!-- 토스트 알림 컨테이너 -->
  <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none"></div>

  <!-- --- [Header Area] --- -->
  <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-gray-300 px-5 md:px-10 py-3.5 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 transition-all">
   
    <!-- 로고 및 타이틀 -->
    <div class="flex items-center gap-3.5 w-full md:w-auto">
      <div class="w-10 h-10 md:w-11 md:h-11 rounded-[12px] bg-gradient-to-br from-[#007AFF] to-[#0056b3] flex items-center justify-center flex-shrink-0 shadow-[0_4px_12px_rgba(0,122,255,0.3)]">
        <i data-feather="calendar" class="text-white w-5 h-5"></i>
      </div>
      <div class="flex flex-col justify-center">
        <h1 class="text-[17px] md:text-[19px] font-bold tracking-tight text-[#1D1D1F] leading-tight">
          HD현대삼호 동반성장부
        </h1>
        <div class="flex items-center gap-2 mt-0.5">
          <p class="text-[13px] text-[#48484A] font-semibold">통합 업무 워크스페이스</p>
          <div id="sync-status" class="flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#E5E5EA] text-[#3A3A3C] cursor-help transition-all border border-gray-300" title="데이터 동기화 상태">
            <i data-feather="loader" class="w-3 h-3 spin-slow"></i> 연결 중...
          </div>
        </div>
      </div>
    </div>

    <!-- 우측 컨트롤 패널 -->
    <div class="flex items-center gap-2 md:gap-3 w-full md:w-auto">
      <!-- 검색창 -->
      <div class="relative flex-1 md:flex-none">
        <i data-feather="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-[#48484A]"></i>
        <input
          id="searchInput"
          type="text"
          placeholder="검색"
          class="w-full md:w-56 lg:w-64 pl-10 pr-4 py-2 bg-gray-100 hover:bg-gray-200 focus:bg-white border border-gray-300 focus:border-[#007AFF] rounded-[10px] text-[15px] transition-all focus:outline-none focus:ring-4 focus:ring-[#007AFF]/10 placeholder:text-[#636366] font-semibold"
          oninput="window.handleSearch(this.value)"
        />
      </div>

      <!-- 엑셀 다운로드 버튼 -->
      <button
        onclick="window.exportToCSV()"
        class="bg-white hover:bg-gray-100 border border-gray-300 text-[#1D1D1F] active:scale-95 px-3.5 py-2 rounded-full text-[14px] font-bold flex items-center gap-1.5 transition-all whitespace-nowrap shadow-sm"
        title="현재 일정을 엑셀(CSV) 파일로 다운로드합니다."
      >
        <i data-feather="download" class="w-4 h-4"></i>
        <span class="hidden sm:inline">다운로드</span>
      </button>

      <!-- 일정 추가 버튼 -->
      <button
        onclick="window.openModal()"
        class="bg-[#007AFF] hover:bg-[#0062CC] active:scale-95 text-white px-4 md:px-5 py-2 rounded-full text-[14px] font-bold flex items-center gap-1.5 transition-all whitespace-nowrap shadow-[0_4px_12px_rgba(0,122,255,0.25)]"
      >
        <i data-feather="plus" class="w-4 h-4"></i>
        <span>새 일정</span>
      </button>
    </div>
  </header>

  <!-- --- [Main Content Area] --- -->
  <main class="flex-1 p-4 md:p-6 lg:p-8 flex flex-col xl:flex-row gap-6 max-w-[1800px] mx-auto w-full h-full min-h-0 relative">
   
    <!-- 최초 로딩 오버레이 -->
    <div id="initial-loader" class="absolute inset-0 bg-[#F5F5F7]/80 backdrop-blur-xl z-50 flex items-center justify-center rounded-[32px] transition-opacity duration-300">
      <div class="flex flex-col items-center gap-5 bg-white p-8 rounded-[28px] shadow-[0_20px_40px_rgba(0,0,0,0.1)] border border-gray-200">
        <div class="p-4 bg-[#007AFF]/10 rounded-full">
          <i data-feather="loader" class="w-8 h-8 text-[#007AFF] spin-slow"></i>
        </div>
        <div class="text-center">
          <p class="font-bold text-[#1D1D1F] text-[18px]">실시간 서버 연결 중</p>
          <p class="text-[14px] text-[#48484A] mt-1.5 font-medium">클라우드 데이터베이스와 동기화하고 있습니다.</p>
        </div>
      </div>
    </div>

    <!-- --- [Left Panel: Dashboard & Calendar] --- -->
    <div class="flex-1 flex flex-col gap-6 min-w-0 min-h-0">
     
      <!-- 대시보드 패널 -->
      <div class="bg-white p-5 md:p-6 rounded-[28px] shadow-sm flex flex-col gap-5 shrink-0 transition-all border border-gray-300">
        <!-- 필터 및 포커스 영역 -->
        <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
          <!-- PC 부서 필터: 3열 2줄 레이아웃 -->
          <div class="lg:w-2/5 flex flex-col gap-3">
            <h3 class="text-[13px] font-bold text-[#3A3A3C] flex items-center gap-1.5 uppercase tracking-wider pl-1">
              <i data-feather="filter" class="w-3.5 h-3.5"></i> 부서 필터링
            </h3>
            <div id="filter-buttons" class="bg-[#E5E5EA] p-1.5 rounded-[16px] grid grid-cols-3 gap-1.5">
              <!-- JS 주입 -->
            </div>
          </div>

          <div class="lg:w-3/5 flex flex-col gap-3 lg:border-l border-gray-200 lg:pl-8">
            <h3 class="text-[13px] font-bold text-[#3A3A3C] flex items-center gap-1.5 uppercase tracking-wider pl-1">
              <i data-feather="star" class="w-3.5 h-3.5 text-[#FF9500]"></i> 이달의 포커스 업무
            </h3>
            <div id="key-tasks-container" class="flex flex-wrap gap-2 overflow-y-auto max-h-[100px] no-scrollbar">
              <!-- JS 주입 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 캘린더 패널 -->
      <div class="bg-white rounded-[28px] shadow-sm flex-1 flex flex-col overflow-hidden min-h-0 border border-gray-300">
        <div class="grid grid-cols-3 items-center p-4 md:p-5 border-b border-gray-200 min-h-[70px] shrink-0 bg-white">
          <div class="flex justify-start">
            <button onclick="window.handleToday()" class="px-4 py-2 text-[14px] font-bold text-[#1D1D1F] bg-[#E5E5EA] hover:bg-gray-300 border border-gray-300 rounded-[10px] transition-colors">
              오늘
            </button>
          </div>

          <div class="flex items-center justify-center gap-4">
            <button onclick="window.handlePrevMonth()" class="p-2 hover:bg-gray-100 border border-transparent hover:border-gray-200 rounded-full transition-colors text-[#48484A] hover:text-[#1D1D1F]">
              <i data-feather="chevron-left" class="w-5 h-5"></i>
            </button>
            <h2 id="calendar-title" class="text-[20px] md:text-[22px] font-bold text-[#1D1D1F] tracking-tight min-w-[140px] text-center whitespace-nowrap">
              <!-- JS 주입 -->
            </h2>
            <button onclick="window.handleNextMonth()" class="p-2 hover:bg-gray-100 border border-transparent hover:border-gray-200 rounded-full transition-colors text-[#48484A] hover:text-[#1D1D1F]">
              <i data-feather="chevron-right" class="w-5 h-5"></i>
            </button>
          </div>

          <div id="calendar-legends" class="hidden md:flex flex-wrap justify-end gap-3 text-[12px] font-bold text-[#48484A]">
            <!-- JS 주입 -->
          </div>
        </div>

        <!-- 요일 헤더 -->
        <div class="grid grid-cols-7 border-b border-gray-200 shrink-0 bg-[#F9F9FB]">
          <div class="text-center py-2.5 text-[12px] font-bold text-[#FF3B30]">일</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">월</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">화</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">수</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">목</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">금</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#007AFF]">토</div>
        </div>

        <!-- 캘린더 그리드 영역 -->
        <div class="flex-1 overflow-y-auto min-h-0 bg-white no-scrollbar">
          <div class="grid grid-cols-7 grid-rows-6 h-full min-h-[500px] md:min-h-[600px] xl:min-h-[650px] border-l border-t border-gray-200" id="calendar-grid">
            <!-- JS 주입 -->
          </div>
        </div>
      </div>
    </div>

    <!-- --- [Right Panel: Daily Timeline Details] --- -->
   <div class="w-full xl:w-[380px] 2xl:w-[420px] bg-white rounded-[28px] shadow-sm flex flex-col h-[450px] md:h-[550px] xl:h-auto max-h-[calc(100vh-6rem)] xl:sticky top-[104px] shrink-0 transition-all border border-gray-300 mt-6 xl:mt-0">
      <div class="p-5 md:p-6 border-b border-gray-200 flex justify-between items-start">
        <div>
          <h2 class="text-[18px] md:text-[20px] font-bold text-[#1D1D1F] mb-1 tracking-tight">
            상세 일정
          </h2>
          <p id="daily-focus-title" class="text-[14px] font-bold text-[#48484A] flex items-center">
            <!-- JS 주입 -->
          </p>
        </div>
        <button
          onclick="window.openModal(window.selectedDate)"
          class="p-2 bg-[#F2F2F7] hover:bg-[#E5E5EA] border border-gray-300 text-[#007AFF] rounded-full transition-colors active:scale-95"
          title="선택한 날짜에 새로운 일정을 추가합니다."
        >
          <i data-feather="plus" class="w-5 h-5"></i>
        </button>
      </div>
     
      <!-- 일간 업무 리스트 -->
      <div id="daily-focus-list" class="flex-1 overflow-y-auto p-4 md:p-5 space-y-3 bg-[#F9F9FB] rounded-b-[28px] no-scrollbar">
        <!-- JS 주입 -->
      </div>
    </div>
  </main>

  <!-- --- [Modal: Task Registration & Edit] --- -->
  <div id="taskModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm items-center justify-center z-[100] p-4 sm:p-6 hidden flex transition-all duration-300">
    <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-[600px] overflow-hidden flex flex-col max-h-[92vh] animation-fade-in border border-gray-300">
     
      <!-- 모달 헤더 -->
      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-200 bg-white">
        <div>
          <h3 id="modal-title" class="text-[20px] font-bold text-[#1D1D1F] tracking-tight">새로운 일정</h3>
        </div>
        <button onclick="window.closeModal()" class="p-2 text-[#48484A] hover:text-[#1D1D1F] hover:bg-[#F2F2F7] border border-gray-200 rounded-full transition-colors focus:outline-none">
          <i data-feather="x" class="w-4 h-4"></i>
        </button>
      </div>
     
      <!-- 모달 폼 -->
      <form id="taskForm" onsubmit="window.handleTaskSubmit(event)" class="p-6 overflow-y-auto space-y-6 bg-white no-scrollbar">
       
        <!-- 제목 및 중요도 -->
        <div class="flex flex-col gap-3">
          <input id="f_title" required type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[14px] p-4 text-[17px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-4 focus:ring-[#007AFF]/10" placeholder="일정 제목" />
         
          <label class="flex items-center gap-2 cursor-pointer w-fit pl-1 mt-1">
            <input type="checkbox" id="f_isFocus" class="w-4 h-4 text-[#FF9500] rounded-[4px] border-gray-400 focus:ring-[#FF9500] cursor-pointer">
            <span class="text-[14px] font-bold text-[#1D1D1F] flex items-center gap-1.5">
              이달의 포커스 업무로 강조
            </span>
          </label>
        </div>

        <div class="h-px w-full bg-gray-200"></div>

        <!-- 구분 및 소속 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">업무 구분 <span class="text-[#FF3B30]">*</span></label>
            <select id="f_type" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10 cursor-pointer appearance-none">
              <option value="individual">개인별 업무</option>
              <option value="section">과단위 (공통) 업무</option>
            </select>
          </div>
          <div>
            <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">소속 파트 <span class="text-[#FF3B30]">*</span></label>
            <select id="f_teamId" onchange="window.handleTeamChange()" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10 cursor-pointer appearance-none">
              <!-- JS 주입 -->
            </select>
          </div>
        </div>

        <!-- 담당자 및 장소 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">담당자 명 <span id="assignee_asterisk" class="text-[#FF3B30]">*</span></label>
            <input id="f_assignee" required type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-4 focus:ring-[#007AFF]/10" placeholder="예: 김상생 책임" />
          </div>
          <div>
            <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">장소</label>
            <input id="f_location" type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-4 focus:ring-[#007AFF]/10" placeholder="선택 사항" />
          </div>
        </div>

        <div class="h-px w-full bg-gray-200"></div>

        <!-- 날짜 및 시간 영역 -->
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">시작 날짜 <span class="text-[#FF3B30]">*</span></label>
              <input id="f_startDate" required type="date" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" />
            </div>
            <div>
              <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">종료 날짜 <span class="text-[#FF3B30]">*</span></label>
              <input id="f_endDate" required type="date" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">시작 시간 <span class="text-[#FF3B30]">*</span></label>
              <input id="f_startTime" required type="time" value="09:00" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" />
            </div>
            <div>
              <label class="block text-[13px] font-bold text-[#3A3A3C] mb-2 pl-1">종료 시간 <span class="text-[#FF3B30]">*</span></label>
              <input id="f_endTime" required type="time" value="18:00" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" />
            </div>
          </div>
        </div>

        <div class="h-px w-full bg-gray-200"></div>

        <!-- 상세 메모 -->
        <div>
          <textarea id="f_description" rows="3" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[14px] p-4 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all resize-none placeholder:text-[#86868B] focus:ring-4 focus:ring-[#007AFF]/10" placeholder="추가 메모를 입력하세요 (선택 사항)"></textarea>
        </div>

        <!-- 하단 컨트롤 버튼 -->
        <div class="pt-2 flex justify-between gap-3 items-center">
          <button type="button" id="btn_delete" onclick="window.handleDeleteBtnClick()" class="hidden px-5 py-3 rounded-full text-[15px] font-bold text-[#FF3B30] bg-[#FF3B30]/10 hover:bg-[#FF3B30]/20 border border-transparent hover:border-[#FF3B30]/30 transition-colors active:scale-95">삭제</button>
          <div class="flex gap-3 ml-auto">
            <button type="submit" id="btn_submit" class="px-8 py-3 bg-[#007AFF] hover:bg-[#0062CC] text-white rounded-full text-[15px] font-bold shadow-[0_4px_12px_rgba(0,122,255,0.3)] transition-all active:scale-95 border border-transparent">저장</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- JavaScript: Firebase & 비즈니스 로직 -->
  <!-- ========================================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /* -------------------------------------------------------------------------- */
    /* 1. 환경 설정 및 상수 정의                                                  */
    /* -------------------------------------------------------------------------- */
    const TEAMS = [
      { id: 't5', name: '수석님', text: 'text-[#FF3B30]', bg: 'bg-[#FF3B30]/15', border: 'border-[#FF3B30]/30', hex: '#FF3B30' },
      { id: 't1', name: '기획과', text: 'text-[#007AFF]', bg: 'bg-[#007AFF]/15', border: 'border-[#007AFF]/30', hex: '#007AFF' },
      { id: 't2', name: '지원과', text: 'text-[#34C759]', bg: 'bg-[#34C759]/15', border: 'border-[#34C759]/30', hex: '#34C759' },
      { id: 't3', name: '인력지원과', text: 'text-[#FF9500]', bg: 'bg-[#FF9500]/15', border: 'border-[#FF9500]/30', hex: '#FF9500' },

    };

    /* -------------------------------------------------------------------------- */
    /* 2. 전역 상태 관리                                                          */
    /* -------------------------------------------------------------------------- */
    let tasks = [];
    let currentDate = new Date();
    window.selectedDate = new Date(); // 모달 오픈시 참조 가능하도록 window 등록
    let filterTeam = 'all';
    let searchQuery = '';
    let currentEditTaskId = null;
    let isDeleteConfirming = false;

    /* -------------------------------------------------------------------------- */
    /* 3. Firebase 설정 및 초기화                                                */
    /* -------------------------------------------------------------------------- */
    const firebaseConfig = {
      apiKey: "AIzaSyDw_WQxhF_07Hjhmgb_rfGuOqAE7lDvw00",
      authDomain: "hd-workspace.firebaseapp.com",
      projectId: "hd-workspace",
      storageBucket: "hd-workspace.firebasestorage.app",
      messagingSenderId: "105147883492",
      appId: "1:105147883492:web:278e38487300447e4a31f1"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    
    let currentUser = null;
    let unsubscribeTasks = null;
    let isFirstLoad = true;

    const initAuth = async () => {
      try {
        // 커스텀 Firebase 프로젝트를 사용하므로, 플랫폼 토큰 확인 과정을 제거하고 익명 로그인만 사용합니다.
        await signInAnonymously(auth);
      } catch (error) {
        console.error("Auth init error:", error);
        updateSyncStatus('error');
        document.getElementById('initial-loader').classList.add('hidden');
      }
    };

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        setupRealtimeSync();
      } else {
        if (unsubscribeTasks) unsubscribeTasks();
      }
    });

    const setupRealtimeSync = () => {
      if (!currentUser) return;
      updateSyncStatus('loading');
      
      const tasksCol = collection(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks');
      
      unsubscribeTasks = onSnapshot(tasksCol, (snapshot) => {
        const fetchedTasks = [];
        snapshot.forEach(doc => {
          fetchedTasks.push({ id: doc.id, ...doc.data() });
        });
        
        tasks = fetchedTasks;
        updateSyncStatus('firebase');
        
        if (isFirstLoad) {
            document.getElementById('initial-loader').classList.add('hidden');
            isFirstLoad = false;
        }
        updateAll();
      }, (error) => {
        console.error("Firestore Snapshot error:", error);
        updateSyncStatus('error');
        if (isFirstLoad) document.getElementById('initial-loader').classList.add('hidden');
      });
    };

    /* -------------------------------------------------------------------------- */
    /* 4. 유틸리티 함수                                                           */
    /* -------------------------------------------------------------------------- */
    const formatDateForInput = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const formatShortDate = (dateString) => {
      const date = new Date(dateString);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    };

    const formatTaskDateRange = (start, end) => {
      if (start === end) return formatShortDate(start);
      return `${formatShortDate(start)}~${formatShortDate(end)}`;
    };

    const isSameDate = (d1, d2) => {
      if (!d1 || !d2) return false;
      return d1.toDateString() === d2.toDateString();
    };
   
    const getFilteredTasks = () => {
      return tasks.filter(task => {
        const matchTeam = filterTeam === 'all' || task.teamId === filterTeam;
        const searchLower = searchQuery.toLowerCase();
        const matchSearch = task.title.toLowerCase().includes(searchLower) ||
                            task.assignee.toLowerCase().includes(searchLower);
        return matchTeam && matchSearch;
      });
    };

    /* -------------------------------------------------------------------------- */
    /* 5. UI 제어 및 렌더링 로직                                                  */
    /* -------------------------------------------------------------------------- */
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
     
      let icon, bgClass, textClass;
      if (type === 'success') {
        icon = 'check-circle'; bgClass = 'bg-[#34C759]/10'; textClass = 'text-[#34C759]';
      } else if (type === 'error') {
        icon = 'alert-triangle'; bgClass = 'bg-[#FF3B30]/10'; textClass = 'text-[#FF3B30]';
      } else {
        icon = 'info'; bgClass = 'bg-[#007AFF]/10'; textClass = 'text-[#007AFF]';
      }

      toast.className = `toast-enter flex items-center gap-3 bg-white shadow-xl border border-gray-300 rounded-full px-5 py-3.5 pointer-events-auto`;
      toast.innerHTML = `<div class="p-1 rounded-full ${bgClass} ${textClass}"><i data-feather="${icon}" class="w-4 h-4"></i></div><span class="text-[14px] font-bold text-[#1D1D1F] pr-2">${message}</span>`;
      container.appendChild(toast);
      feather.replace();

      setTimeout(() => {
        toast.style.animation = 'fadeIn 0.3s ease-in reverse forwards';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    window.exportToCSV = function() {
      if (tasks.length === 0) {
        showToast('다운로드할 데이터가 없습니다.', 'error');
        return;
      }
     
      const headers = ['일련번호', '업무 제목', '구분', '소속 파트', '담당자', '장소', '시작일자', '종료일자', '시작시간', '종료시간', '주요업무 여부', '상세메모'];
      const rows = tasks.map(task => {
        const teamName = TEAMS.find(t => t.id === task.teamId)?.name || '알 수 없음';
        const typeName = task.type === 'section' ? '과단위' : '개인별';
        const isFocusText = task.isFocus ? 'O' : 'X';
        const escapeCSV = (str) => `"${(str || '').toString().replace(/"/g, '""')}"`;
       
        return [
          task.id, escapeCSV(task.title), typeName, teamName, escapeCSV(task.assignee),
          escapeCSV(task.location), task.startDate, task.endDate, task.startTime, task.endTime,
          isFocusText, escapeCSV(task.description)
        ].join(',');
      });
     
      const csvContent = '\uFEFF' + [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `동반성장부_업무일정_${formatDateForInput(new Date())}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('엑셀 파일 다운로드가 완료되었습니다.', 'success');
    }

    function updateSyncStatus(mode) {
      const statusEl = document.getElementById('sync-status');
      const statusConfig = {
        loading: { html: `<i data-feather="refresh-cw" class="w-3 h-3 spin-slow"></i> 통신 중`, classes: "bg-[#007AFF]/10 text-[#007AFF]" },
        firebase: { html: `<i data-feather="zap" class="w-3 h-3 fill-current"></i> 실시간 연동 중`, classes: "bg-[#34C759]/10 text-[#34C759]" },
        error: { html: `<i data-feather="alert-circle" class="w-3 h-3"></i> 연결 실패`, classes: "bg-[#FF3B30]/10 text-[#FF3B30] cursor-pointer" }
      };

      const cur = statusConfig[mode];
      if(!cur) return;
      statusEl.innerHTML = cur.html;
      statusEl.className = `flex items-center gap-1.5 text-[11px] font-bold px-2.5 py-1 rounded-full transition-all border border-gray-300 ${cur.classes}`;
      feather.replace();
    }

    function updateAll() {
      renderDashboard();
      renderCalendar();
      renderDailyFocus();
      feather.replace();
    }

    function renderDashboard() {
      const filtered = getFilteredTasks();
     
      let filterHtml = `<button onclick="window.setFilter('all')" class="px-3 py-2 rounded-[12px] text-[14px] font-bold transition-all border ${filterTeam === 'all' ? 'bg-white text-[#1D1D1F] border-gray-300 shadow-sm' : 'text-[#48484A] border-transparent hover:text-[#1D1D1F] hover:bg-gray-100'}">전체 보기</button>`;
     
      TEAMS.forEach(team => {
        const isActive = filterTeam === team.id;
        filterHtml += `<button onclick="window.setFilter('${team.id}')" class="px-3 py-2 rounded-[12px] text-[14px] font-bold transition-all border ${isActive ? 'bg-white text-[#1D1D1F] border-gray-300 shadow-sm' : 'text-[#48484A] border-transparent hover:text-[#1D1D1F] hover:bg-gray-100'}">${team.name}</button>`;
      });
      document.getElementById('filter-buttons').innerHTML = filterHtml;

      const currentYearMonth = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
      const monthTasks = filtered.filter(t => t.startDate.startsWith(currentYearMonth) || t.endDate.startsWith(currentYearMonth));
      const focusTasks = monthTasks.filter(t => t.isFocus).sort((a, b) => {
        if (a.startDate !== b.startDate) return a.startDate.localeCompare(b.startDate);
        return a.startTime.localeCompare(b.startTime);
      });

      let keyTasksHtml = '';
      if (focusTasks.length === 0) {
        keyTasksHtml = `<span class="text-[14px] text-[#48484A] px-1 py-1 font-bold">지정된 포커스 업무가 없습니다.</span>`;
      } else {
        focusTasks.forEach(task => {
          const team = TEAMS.find(t => t.id === task.teamId);
          const dateRangeBadge = formatTaskDateRange(task.startDate, task.endDate);

          keyTasksHtml += `
            <div ondblclick="window.openEditTaskModal('${task.id}')" class="cursor-pointer px-3 py-2 rounded-[14px] text-[13px] flex items-center gap-2 transition-all bg-white hover:bg-[#F2F2F7] border border-gray-300 shadow-sm select-none" title="더블 클릭하여 수정">
              <span class="text-[11px] font-bold text-[#1D1D1F] bg-[#F2F2F7] px-2 py-0.5 rounded-[6px] border border-gray-200">${dateRangeBadge}</span>
              <div class="w-2 h-2 rounded-full" style="background-color: ${team.hex};"></div>
              <span class="font-bold text-[#1D1D1F] truncate max-w-[150px]">${task.title}</span>
            </div>
          `;
        });
      }
      document.getElementById('key-tasks-container').innerHTML = keyTasksHtml;
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;

      let legendsHtml = '';
      TEAMS.forEach(team => {
        legendsHtml += `<span class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full" style="background-color:${team.hex}"></div> ${team.name}</span>`;
      });
      document.getElementById('calendar-legends').innerHTML = legendsHtml;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const filtered = getFilteredTasks();

      let gridHtml = '';

      for (let i = 0; i < 42; i++) {
        const dayNum = i - firstDay + 1;
        const isCurrentMonth = dayNum > 0 && dayNum <= daysInMonth;
        const cellDate = isCurrentMonth ? new Date(year, month, dayNum) : null;
        const cellDateStr = cellDate ? formatDateForInput(cellDate) : '';
        const isCellToday = isSameDate(cellDate, today);
        const isSelected = isSameDate(cellDate, window.selectedDate);
       
        const holidayName = isCurrentMonth ? HOLIDAYS[cellDateStr] : null;
        const isSunday = i % 7 === 0;
        const isSaturday = i % 7 === 6;
        const isRedDay = isCurrentMonth && (isSunday || holidayName);
       
        let cellClasses = `relative border-r border-b border-gray-200 transition-colors p-1 md:p-1.5 flex flex-col h-full overflow-hidden `;
        if (!isCurrentMonth) cellClasses += `bg-[#F9F9FB] text-black/15 `;
        else {
          cellClasses += `bg-white hover:bg-gray-50 cursor-pointer `;
          if (isSelected) cellClasses += `ring-2 ring-inset ring-[#007AFF] z-10 bg-[#007AFF]/5 rounded-[4px] `;
        }

        let cellContent = '';
       
        if (isCurrentMonth) {
          const dayTasks = filtered.filter(t => t.startDate <= cellDateStr && t.endDate >= cellDateStr)
                                   .sort((a, b) => a.startTime.localeCompare(b.startTime));

          let numColorClass = 'text-[#1D1D1F]';
          if (isCellToday) numColorClass = 'text-white';
          else if (isRedDay) numColorClass = 'text-[#FF3B30]';
          else if (isSaturday) numColorClass = 'text-[#007AFF]';

          const numDisplay = isCellToday ? `<span class="bg-[#007AFF] w-6 h-6 md:w-7 md:h-7 flex items-center justify-center rounded-full shadow-md font-bold">${dayNum}</span>` : dayNum;
          const holidayLabel = holidayName ? `<span class="text-[10px] font-bold text-[#FF3B30] truncate ml-1">${holidayName}</span>` : '';

          const visibleTasks = dayTasks.slice(0, 5);
          const remainingCount = dayTasks.length - 5;

          let task1Html = '';
          if (visibleTasks[0]) {
            const t = visibleTasks[0];
            const team = TEAMS.find(x => x.id === t.teamId);
            task1Html = `
              <div ondblclick="event.stopPropagation(); window.openEditTaskModal('${t.id}')" class="flex-1 min-w-0 ${team.bg} ${team.text} px-1.5 py-0.5 rounded-[4px] text-[10px] md:text-[11px] font-bold truncate border ${team.border}" title="${t.title}">
                ${t.title}
              </div>
            `;
          }

          let subTasksHtml = '';
          if (visibleTasks.length > 1) {
            subTasksHtml = '<div class="grid grid-cols-2 gap-1 mt-1">';
            visibleTasks.slice(1).forEach(t => {
              const team = TEAMS.find(x => x.id === t.teamId);
              subTasksHtml += `
                <div ondblclick="event.stopPropagation(); window.openEditTaskModal('${t.id}')" class="${team.bg} ${team.text} px-1 py-0.5 rounded-[4px] text-[9px] md:text-[10px] font-bold truncate border ${team.border}" title="${t.title}">
                  ${t.title}
                </div>
              `;
            });
            subTasksHtml += '</div>';
          }

          const moreHtml = remainingCount > 0 ? `<div class="text-[10px] text-[#48484A] font-bold mt-1 ml-0.5 bg-gray-100 px-1 rounded w-fit">+ ${remainingCount}개</div>` : '';

          cellContent = `
            <div class="flex items-center gap-1.5 min-h-[28px] w-full">
              <div class="text-[14px] md:text-[15px] font-bold ${numColorClass} shrink-0 w-6 md:w-7 flex items-center justify-center">${numDisplay}</div>
              ${holidayLabel || task1Html}
            </div>
            ${holidayLabel && task1Html ? `<div class="mt-0.5">${task1Html}</div>` : ''}
            ${subTasksHtml}
            ${moreHtml}
          `;
        } else {
          cellContent = `<div class="text-[14px] md:text-[15px] font-bold p-1">${dayNum > 0 ? dayNum : ''}</div>`;
        }

        const onClickAttr = isCurrentMonth ? `onclick="window.handleDateClick('${cellDateStr}')" ondblclick="window.openModal(new Date('${cellDateStr}'))"` : '';
        gridHtml += `<div class="${cellClasses}" ${onClickAttr}>${cellContent}</div>`;
      }
     
      document.getElementById('calendar-grid').innerHTML = gridHtml;
    }

    function renderDailyFocus() {
      const daysStr = ['일','월','화','수','목','금','토'];
      const dateStr = formatDateForInput(window.selectedDate);
      const isHoliday = HOLIDAYS[dateStr];
      const isSun = window.selectedDate.getDay() === 0;
      const isRed = isHoliday || isSun;
     
      let titleHtml = `${window.selectedDate.getMonth() + 1}월 ${window.selectedDate.getDate()}일 ${daysStr[window.selectedDate.getDay()]}요일`;
      if (isHoliday) titleHtml += ` <span class="text-[#FF3B30] ml-2 bg-[#FF3B30]/10 px-2 py-0.5 rounded-[6px] text-[11px] font-bold border border-[#FF3B30]/20">${isHoliday}</span>`;
     
      const titleEl = document.getElementById('daily-focus-title');
      titleEl.innerHTML = titleHtml;
      if (isRed) titleEl.classList.replace('text-[#48484A]', 'text-[#FF3B30]');
      else titleEl.classList.replace('text-[#FF3B30]', 'text-[#48484A]');

      const filtered = getFilteredTasks();
      const dayTasks = filtered.filter(t => t.startDate <= dateStr && t.endDate >= dateStr).sort((a, b) => a.startTime.localeCompare(b.startTime));

      let listHtml = '';
     
      if (dayTasks.length === 0) {
        listHtml = `
          <div class="h-full flex flex-col items-center justify-center text-[#48484A]">
            <p class="font-bold text-[16px] text-[#1D1D1F]">일정 없음</p>
            <p class="text-[14px] mt-1 font-medium">이 날짜에 등록된 업무가 없습니다.</p>
          </div>
        `;
      } else {
        dayTasks.forEach(task => {
          const team = TEAMS.find(t => t.id === task.teamId);
          const isSection = task.type === 'section';

          let descHtml = '';
          if (task.description) {
            descHtml = `<div class="mt-3 text-[13px] text-[#3A3A3C] bg-white p-3 rounded-[12px] leading-relaxed font-bold border border-gray-200 whitespace-pre-wrap">${task.description}</div>`;
          }

          let locationHtml = '';
          if (task.location) {
            locationHtml = `<span class="flex items-center gap-1.5 font-bold"><i data-feather="map-pin" class="w-3.5 h-3.5"></i> ${task.location}</span>`;
          }
         
          const focusStarHtml = task.isFocus ? `<i data-feather="star" class="w-4 h-4 text-[#FF9500] fill-[#FF9500] mb-0.5"></i>` : '';

          listHtml += `
            <div ondblclick="window.openEditTaskModal('${task.id}')" class="bg-white rounded-[20px] p-4 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden group border border-gray-300 select-none" title="더블 클릭하여 수정">
              <div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ${team.hex};"></div>
             
              <div class="pl-2.5">
                <div class="flex items-start justify-between mb-1.5">
                  <h4 class="font-bold text-[#1D1D1F] text-[15px] leading-snug flex items-center gap-2">
                    ${task.title} ${focusStarHtml}
                  </h4>
                  <span class="text-[11px] font-bold px-2 py-0.5 rounded-[6px] ${team.bg} ${team.text} border ${team.border} whitespace-nowrap">${team.name}</span>
                </div>
               
                <div class="flex flex-col gap-2 mt-2">
                  <div class="flex items-center gap-3 text-[13px] font-bold text-[#48484A]">
                    <span class="flex items-center gap-1.5 bg-gray-100 px-2 py-0.5 rounded-md border border-gray-200"><i data-feather="clock" class="w-3.5 h-3.5"></i> ${task.startTime} ~ ${task.endTime}</span>
                    ${locationHtml}
                  </div>
                 
                  <div class="flex items-center gap-2 text-[13px] mt-1 font-bold text-[#1D1D1F]">
                    <div class="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center border border-gray-300 text-[10px]"><i data-feather="${isSection ? 'users' : 'user'}" class="w-3.5 h-3.5 text-[#3A3A3C]"></i></div>
                    ${task.assignee} <span class="text-[#48484A] font-bold text-[12px]">(${isSection ? '과단위' : '개인'})</span>
                  </div>
                 
                  ${descHtml}
                </div>
              </div>
            </div>
          `;
        });
      }
     
      document.getElementById('daily-focus-list').innerHTML = listHtml;
    }

    /* -------------------------------------------------------------------------- */
    /* 6. 사용자 이벤트 핸들러 (전역 window 바인딩)                                */
    /* -------------------------------------------------------------------------- */
    window.handleSearch = function(val) { searchQuery = val; updateAll(); };
    window.setFilter = function(id) { filterTeam = id; updateAll(); };
    window.handleToday = function() { currentDate = new Date(); window.selectedDate = new Date(); updateAll(); };
    window.handlePrevMonth = function() { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1); updateAll(); };
    window.handleNextMonth = function() { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1); updateAll(); };
    window.handleDateClick = function(dateStr) { window.selectedDate = new Date(dateStr); updateAll(); };

    /* -------------------------------------------------------------------------- */
    /* 7. 모달 창 및 데이터 CUD 제어 로직                                         */
    /* -------------------------------------------------------------------------- */
    function resetDeleteBtn() {
      const btn = document.getElementById('btn_delete');
      if (btn) {
        btn.innerText = '삭제';
        btn.className = 'px-5 py-3 rounded-full text-[15px] font-bold text-[#FF3B30] bg-[#FF3B30]/10 hover:bg-[#FF3B30]/20 border border-transparent hover:border-[#FF3B30]/30 transition-colors active:scale-95';
      }
    }

    window.handleTeamChange = function() {
      const teamId = document.getElementById('f_teamId').value;
      const assigneeInput = document.getElementById('f_assignee');
      const asterisk = document.getElementById('assignee_asterisk');

      if (teamId === 't5') {
        assigneeInput.required = false;
        if (asterisk) asterisk.style.display = 'none';
      } else {
        assigneeInput.required = true;
        if (asterisk) asterisk.style.display = 'inline';
      }
    }

    window.openModal = function(dateObj = new Date()) {
      currentEditTaskId = null;
      document.getElementById('taskForm').reset();
     
      document.getElementById('modal-title').innerText = "새로운 일정";
      document.getElementById('btn_submit').innerText = "추가";
     
      document.getElementById('f_startDate').value = formatDateForInput(dateObj);
      document.getElementById('f_endDate').value = formatDateForInput(dateObj);
      document.getElementById('f_isFocus').checked = false;
     
      document.getElementById('btn_delete').classList.add('hidden');
      document.getElementById('taskModal').classList.remove('hidden');
      document.getElementById('taskForm').scrollTop = 0;
      isDeleteConfirming = false;
      resetDeleteBtn();
      window.handleTeamChange();
    }

    window.openEditTaskModal = function(id) {
      currentEditTaskId = id;
      const task = tasks.find(x => x.id === id);
      if(!task) return;

      document.getElementById('modal-title').innerText = "일정 상세 및 편집";
      document.getElementById('btn_submit').innerText = "저장";

      const fields = ['title','type','teamId','assignee','location','startDate','endDate','startTime','endTime','description'];
      fields.forEach(f => {
        document.getElementById('f_' + f).value = task[f] || '';
      });
     
      document.getElementById('f_isFocus').checked = !!task.isFocus;
     
      document.getElementById('btn_delete').classList.remove('hidden');
      document.getElementById('taskModal').classList.remove('hidden');
      document.getElementById('taskForm').scrollTop = 0;
      isDeleteConfirming = false;
      resetDeleteBtn();
      window.handleTeamChange();
    }

    window.closeModal = function() {
      document.getElementById('taskModal').classList.add('hidden');
    }

    window.handleTaskSubmit = async function(e) {
      e.preventDefault();
      
      if (!currentUser) {
        showToast('인증 정보가 확인되지 않았습니다. 잠시 후 다시 시도해주세요.', 'error');
        return;
      }

      let assigneeVal = document.getElementById('f_assignee').value;
      const teamIdVal = document.getElementById('f_teamId').value;
     
      if (teamIdVal === 't5' && !assigneeVal.trim()) {
        assigneeVal = '수석님';
      }
     
      const formData = {
        title: document.getElementById('f_title').value,
        type: document.getElementById('f_type').value,
        teamId: teamIdVal,
        assignee: assigneeVal,
        location: document.getElementById('f_location').value,
        startDate: document.getElementById('f_startDate').value,
        endDate: document.getElementById('f_endDate').value,
        startTime: document.getElementById('f_startTime').value,
        endTime: document.getElementById('f_endTime').value,
        description: document.getElementById('f_description').value,
        isFocus: document.getElementById('f_isFocus').checked
      };

      const taskId = currentEditTaskId || Date.now().toString();
      const taskRef = doc(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks', taskId);

      try {
        await setDoc(taskRef, { ...formData, id: taskId });
        if (currentEditTaskId) {
            showToast('일정이 성공적으로 수정되었습니다.', 'success');
        } else {
            showToast('새로운 실시간 일정이 등록되었습니다.', 'success');
        }
        window.closeModal();
      } catch (error) {
        console.error("저장 실패:", error);
        showToast('클라우드 저장소와의 연결 오류로 저장에 실패했습니다.', 'error');
      }
    }

    window.handleDeleteBtnClick = async function() {
      if (!isDeleteConfirming) {
        isDeleteConfirming = true;
        const btn = document.getElementById('btn_delete');
        btn.innerText = "정말 삭제할까요?";
        btn.className = "px-5 py-3 rounded-full text-[15px] font-bold text-white bg-[#FF3B30] hover:bg-[#D70015] border border-transparent transition-colors active:scale-95";
       
        setTimeout(() => {
          if (isDeleteConfirming && !document.getElementById('taskModal').classList.contains('hidden')) {
            isDeleteConfirming = false;
            resetDeleteBtn();
          }
        }, 3000);
        return;
      }
     
      if (!currentUser || !currentEditTaskId) return;

      const taskRef = doc(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks', currentEditTaskId);
      try {
          await deleteDoc(taskRef);
          showToast('일정이 실시간 동기화되어 삭제되었습니다.', 'success');
          window.closeModal();
      } catch (error) {
          console.error("삭제 실패:", error);
          showToast('삭제 중 오류가 발생했습니다.', 'error');
      }
    }

    /* -------------------------------------------------------------------------- */
    /* 8. 앱 초기화 실행                                                          */
    /* -------------------------------------------------------------------------- */
    document.addEventListener('DOMContentLoaded', () => {
      const selectEl = document.getElementById('f_teamId');
      TEAMS.forEach(team => {
        selectEl.add(new Option(team.name, team.id));
      });
      initAuth();
    });
  </script>
</body>
</html>
