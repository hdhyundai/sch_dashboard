<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD현대삼호 동반성장부 통합 업무 워크스페이스</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
 
  <script src="https://unpkg.com/feather-icons"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    /* 미니멀 커스텀 스크롤바 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }
   
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 트랜지션 및 애니메이션 설정 */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animation-fade-in {
      animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast-enter {
      animation: slideInRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
   
    .spin-slow {
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* 보기 모드(비활성화) 폼 스타일 */
    #taskForm input:disabled, 
    #taskForm select:disabled, 
    #taskForm textarea:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      background-color: #E5E5EA !important;
      color: #48484A;
    }

    /* select 화살표 커스텀 (시간, 소속 등) */
    .custom-select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2348484A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1em;
      padding-right: 2.5rem;
    }
  </style>
</head>
<body class="min-h-screen bg-[#F2F2F7] text-[#1D1D1F] flex flex-col relative selection:bg-[#007AFF]/20 selection:text-[#007AFF] overflow-x-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Pretendard', system-ui, sans-serif;">

  <div id="toast-container" class="fixed bottom-8 right-8 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

  <div id="login-container" class="fixed inset-0 bg-[#F2F2F7] z-[200] flex items-center justify-center hidden">
    <div class="bg-white p-8 md:p-10 rounded-[32px] shadow-[0_20px_40px_rgba(0,0,0,0.08)] border border-gray-200 w-full max-w-[400px] mx-4 animation-fade-in">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-[16px] bg-gradient-to-br from-[#007AFF] to-[#0056b3] flex items-center justify-center shadow-lg mb-4">
          <i data-feather="calendar" class="text-white w-7 h-7"></i>
        </div>
        <h2 class="text-[22px] font-bold text-[#1D1D1F] tracking-tight text-center">동반성장부 워크스페이스</h2>
        <p class="text-[14px] text-[#48484A] font-medium mt-1">사내 관리자에게 부여받은 계정으로 로그인해주세요.</p>
      </div>
      <form onsubmit="window.handleLogin(event)" class="flex flex-col gap-4">
        <div>
          <label class="block text-[13px] font-bold text-[#3A3A3C] mb-1.5 pl-1">이메일</label>
          <input id="login_email" type="email" required class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" placeholder="이메일 주소" />
        </div>
        <div>
          <label class="block text-[13px] font-bold text-[#3A3A3C] mb-1.5 pl-1">비밀번호</label>
          <input id="login_password" type="password" required class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[12px] p-3.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-4 focus:ring-[#007AFF]/10" placeholder="비밀번호" />
        </div>
        <button type="submit" id="btn_login" class="mt-2 w-full py-3.5 bg-[#007AFF] hover:bg-[#0062CC] text-white rounded-[12px] text-[15px] font-bold shadow-md transition-all active:scale-95 border border-transparent flex justify-center items-center gap-2">
          <span>로그인</span>
        </button>
        <div class="mt-2 text-center">
          <button type="button" onclick="window.openPasswordModal()" class="text-[13px] text-[#48484A] font-bold hover:text-[#007AFF] transition-colors underline underline-offset-2">
            비밀번호를 변경하시려면 여기를 클릭하세요
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-container" class="flex-1 flex flex-col min-h-screen hidden w-full">
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-gray-300 px-5 md:px-10 py-3.5 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 transition-all">
     
      <div class="flex items-center gap-3.5 w-full md:w-auto shrink-0">
        <div class="w-10 h-10 md:w-11 md:h-11 rounded-[12px] bg-gradient-to-br from-[#007AFF] to-[#0056b3] flex items-center justify-center flex-shrink-0 shadow-[0_4px_12px_rgba(0,122,255,0.3)]">
          <i data-feather="calendar" class="text-white w-5 h-5"></i>
        </div>
        <div class="flex flex-col justify-center">
          <h1 class="text-[17px] md:text-[19px] font-bold tracking-tight text-[#1D1D1F] leading-tight">
            HD현대삼호 동반성장부
          </h1>
          <div class="flex items-center gap-2 mt-0.5">
            <p class="text-[13px] text-[#48484A] font-semibold">통합 업무 워크스페이스</p>
            <div id="sync-status" class="flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#E5E5EA] text-[#3A3A3C] cursor-help transition-all border border-gray-300" title="데이터 동기화 상태">
              <i data-feather="loader" class="w-3 h-3 spin-slow"></i> 연결 중...
            </div>
          </div>
        </div>
      </div>

      <div class="hidden lg:flex flex-1 justify-center items-center px-4 min-w-0">
        <div id="quote-container" class="transition-opacity duration-700 ease-in-out opacity-0 max-w-[500px] xl:max-w-[700px] truncate text-center cursor-default select-none flex flex-col xl:flex-row items-center xl:items-baseline gap-0.5 xl:gap-2">
          <span class="text-[12px] xl:text-[14px] text-[#48484A] font-medium tracking-tight italic truncate w-full" id="quote-text"></span>
          <span class="text-[10px] xl:text-[11px] text-[#86868B] font-bold shrink-0" id="quote-author"></span>
        </div>
      </div>

      <div class="flex items-center gap-2 md:gap-3 w-full lg:w-auto shrink-0 mt-3 lg:mt-0">
        <div class="relative flex-1 lg:flex-none">
          <i data-feather="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-[#48484A]"></i>
          <input
            id="searchInput"
            type="text"
            placeholder="검색 (예: 주간보고, 김상생)"
            class="w-full md:w-56 lg:w-72 pl-10 pr-4 py-2 bg-gray-100 hover:bg-gray-200 focus:bg-white border border-gray-300 focus:border-[#007AFF] rounded-[10px] text-[14px] transition-all focus:outline-none focus:ring-4 focus:ring-[#007AFF]/10 placeholder:text-[#86868B] font-semibold"
            oninput="window.handleSearch(this.value)"
          />
        </div>

      <button
        onclick="window.exportToExcel()"
        class="bg-white hover:bg-gray-100 border border-gray-300 text-[#1D1D1F] active:scale-95 px-3.5 py-2 rounded-full text-[14px] font-bold flex items-center gap-1.5 transition-all whitespace-nowrap shadow-sm"
        title="현재 일정을 엑셀 파일로 다운로드합니다."
      >
        <i data-feather="download" class="w-4 h-4"></i>
        <span class="hidden sm:inline">다운로드</span>
      </button>

      <button
        onclick="window.openModal()"
        class="bg-[#007AFF] hover:bg-[#0062CC] active:scale-95 text-white px-4 md:px-5 py-2 rounded-full text-[14px] font-bold flex items-center gap-1.5 transition-all whitespace-nowrap shadow-[0_4px_12px_rgba(0,122,255,0.25)]"
      >
        <i data-feather="plus" class="w-4 h-4"></i>
        <span>새 일정</span>
      </button>

      <button
        onclick="window.handleLogout()"
        class="p-2 md:p-2.5 bg-[#F2F2F7] hover:bg-[#E5E5EA] border border-gray-300 text-[#FF3B30] active:scale-95 rounded-full transition-all flex items-center justify-center ml-1 md:ml-0"
        title="로그아웃"
      >
        <i data-feather="log-out" class="w-4 h-4 md:w-5 md:h-5"></i>
      </button>
    </div>
  </header>

  <main class="flex-1 p-4 md:p-6 lg:p-8 flex flex-col xl:flex-row gap-6 max-w-[1800px] mx-auto w-full h-full min-h-0 relative">
   
    <div id="initial-loader" class="absolute inset-0 bg-[#F5F5F7]/80 backdrop-blur-xl z-50 flex items-center justify-center rounded-[32px] transition-opacity duration-300">
      <div class="flex flex-col items-center gap-5 bg-white p-8 rounded-[28px] shadow-[0_20px_40px_rgba(0,0,0,0.1)] border border-gray-200">
        <div class="p-4 bg-[#007AFF]/10 rounded-full">
          <i data-feather="loader" class="w-8 h-8 text-[#007AFF] spin-slow"></i>
        </div>
        <div class="text-center">
          <p class="font-bold text-[#1D1D1F] text-[18px]">실시간 서버 연결 중</p>
          <p class="text-[14px] text-[#48484A] mt-1.5 font-medium">클라우드 데이터베이스와 동기화하고 있습니다.</p>
        </div>
      </div>
    </div>

    <div class="flex-1 flex flex-col gap-6 min-w-0 min-h-0">
     
      <div class="bg-white p-5 md:p-6 rounded-[28px] shadow-sm flex flex-col gap-5 shrink-0 transition-all border border-gray-300">
        <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
          <div class="lg:w-2/5 flex flex-col gap-3">
            <h3 class="text-[13px] font-bold text-[#3A3A3C] flex items-center gap-1.5 uppercase tracking-wider pl-1">
              <i data-feather="filter" class="w-3.5 h-3.5"></i> 파트 필터링
            </h3>
            <div id="filter-buttons" class="bg-[#E5E5EA] p-1.5 rounded-[16px] grid grid-cols-3 gap-1.5">
              </div>
          </div>

          <div class="lg:w-3/5 flex flex-col gap-3 lg:border-l border-gray-200 lg:pl-8">
            <h3 class="text-[13px] font-bold text-[#3A3A3C] flex items-center gap-1.5 uppercase tracking-wider pl-1">
              <i data-feather="star" class="w-3.5 h-3.5 text-[#FF9500]"></i> 이달의 포커스 업무
            </h3>
            <div id="key-tasks-container" class="flex flex-wrap gap-2 overflow-y-auto max-h-[100px] no-scrollbar">
              </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-[28px] shadow-sm flex-1 flex flex-col overflow-hidden min-h-0 border border-gray-300">
        <div class="grid grid-cols-3 items-center p-4 md:p-5 border-b border-gray-200 min-h-[70px] shrink-0 bg-white">
          <div class="flex justify-start">
            <button onclick="window.handleToday()" class="px-4 py-2 text-[14px] font-bold text-[#1D1D1F] bg-[#E5E5EA] hover:bg-gray-300 border border-gray-300 rounded-[10px] transition-colors">
              오늘
            </button>
          </div>

          <div class="flex items-center justify-center gap-4">
            <button onclick="window.handlePrevMonth()" class="p-2 hover:bg-gray-100 border border-transparent hover:border-gray-200 rounded-full transition-colors text-[#48484A] hover:text-[#1D1D1F]">
              <i data-feather="chevron-left" class="w-5 h-5"></i>
            </button>
            <h2 id="calendar-title" class="text-[20px] md:text-[22px] font-bold text-[#1D1D1F] tracking-tight min-w-[140px] text-center whitespace-nowrap">
              </h2>
            <button onclick="window.handleNextMonth()" class="p-2 hover:bg-gray-100 border border-transparent hover:border-gray-200 rounded-full transition-colors text-[#48484A] hover:text-[#1D1D1F]">
              <i data-feather="chevron-right" class="w-5 h-5"></i>
            </button>
          </div>

          <div id="calendar-legends" class="hidden md:flex flex-wrap justify-end gap-3 text-[12px] font-bold text-[#48484A]">
            </div>
        </div>

        <div class="grid grid-cols-7 border-b border-gray-200 shrink-0 bg-[#F9F9FB]">
          <div class="text-center py-2.5 text-[12px] font-bold text-[#FF3B30]">일</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">월</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">화</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">수</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">목</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#3A3A3C]">금</div>
          <div class="text-center py-2.5 text-[12px] font-bold text-[#007AFF]">토</div>
        </div>

        <div class="flex-1 overflow-y-auto min-h-0 bg-white no-scrollbar">
          <div class="grid grid-cols-7 grid-rows-6 h-full min-h-[500px] md:min-h-[600px] xl:min-h-[650px] border-l border-t border-gray-200" id="calendar-grid">
            </div>
        </div>
      </div>
    </div>

    <div class="w-full xl:w-[380px] 2xl:w-[420px] bg-white rounded-[28px] shadow-sm flex flex-col h-[450px] md:h-[550px] xl:h-auto max-h-[calc(100vh-6rem)] xl:sticky top-[104px] shrink-0 transition-all border border-gray-300 mt-6 xl:mt-0">
      <div class="p-5 md:p-6 border-b border-gray-200 flex justify-between items-start">
        <div>
          <h2 class="text-[18px] md:text-[20px] font-bold text-[#1D1D1F] mb-1 tracking-tight">
            상세 일정
          </h2>
          <p id="daily-focus-title" class="text-[14px] font-bold text-[#48484A] flex items-center">
            </p>
        </div>
        <button
          onclick="window.openModal(window.selectedDate)"
          class="p-2 bg-[#F2F2F7] hover:bg-[#E5E5EA] border border-gray-300 text-[#007AFF] rounded-full transition-colors active:scale-95"
          title="선택한 날짜에 새로운 일정을 추가합니다."
        >
          <i data-feather="plus" class="w-5 h-5"></i>
        </button>
      </div>
     
      <div id="daily-focus-list" class="flex-1 overflow-y-auto p-4 md:p-5 space-y-3 bg-[#F9F9FB] rounded-b-[28px] no-scrollbar">
        </div>
    </div>
  </main>
</div> 

<div id="taskModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm items-center justify-center z-[100] p-4 hidden flex transition-all duration-300">
    <div class="bg-white rounded-[24px] shadow-2xl w-full max-w-[550px] overflow-hidden flex flex-col max-h-[85vh] animation-fade-in border border-gray-300">
     
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-200 bg-white shrink-0">
        <div>
          <h3 id="modal-title" class="text-[18px] font-bold text-[#1D1D1F] tracking-tight">새로운 일정</h3>
        </div>
        <button onclick="window.closeModal()" class="p-1.5 text-[#48484A] hover:text-[#1D1D1F] hover:bg-[#F2F2F7] border border-transparent rounded-full transition-colors focus:outline-none">
          <i data-feather="x" class="w-4 h-4"></i>
        </button>
      </div>
     
      <form id="taskForm" onsubmit="window.handleTaskSubmit(event)" class="p-5 overflow-y-auto space-y-4 bg-white custom-scrollbar flex-1">
       
        <div class="flex flex-col gap-2.5">
          <input id="f_title" required type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3.5 py-2.5 text-[15px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-2 focus:ring-[#007AFF]/10" placeholder="일정 제목" />
         
          <label class="flex items-center gap-1.5 cursor-pointer w-fit pl-1">
            <input type="checkbox" id="f_isFocus" class="w-3.5 h-3.5 text-[#FF9500] rounded-[4px] border-gray-400 focus:ring-[#FF9500] cursor-pointer">
            <span class="text-[13px] font-bold text-[#1D1D1F]">
              이달의 포커스 업무로 강조
            </span>
          </label>
        </div>

        <div class="h-px w-full bg-gray-200 my-1"></div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">업무 구분 <span class="text-[#FF3B30]">*</span></label>
            <select id="f_type" class="custom-select w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10 cursor-pointer">
              <option value="individual">개인별 업무</option>
              <option value="section">과단위 업무</option>
              <option value="department">부서단위 업무</option>
            </select>
          </div>
          <div>
            <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">소속 파트 <span class="text-[#FF3B30]">*</span></label>
            <select id="f_teamId" onchange="window.handleTeamChange()" class="custom-select w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10 cursor-pointer">
              </select>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">담당자 명 <span id="assignee_asterisk" class="text-[#FF3B30]">*</span></label>
            <input id="f_assignee" required type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-2 focus:ring-[#007AFF]/10" placeholder="예: 김상생 책임" />
          </div>
          <div>
            <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">장소</label>
            <input id="f_location" type="text" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all placeholder:text-[#86868B] focus:ring-2 focus:ring-[#007AFF]/10" placeholder="선택 사항" />
          </div>
        </div>

        <div class="h-px w-full bg-gray-200 my-1"></div>

        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">시작 날짜 <span class="text-[#FF3B30]">*</span></label>
              <input id="f_startDate" required type="date" onchange="window.handleTimeConstraints()" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10 cursor-pointer" />
            </div>
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">종료 날짜 <span class="text-[#FF3B30]">*</span></label>
              <input id="f_endDate" required type="date" onchange="window.handleTimeConstraints()" class="w-full bg-[#F5F5F7] border border-gray-300 rounded-[10px] px-3 py-2 text-[14px] font-bold focus:bg-white focus:border-[#007AFF] outline-none transition-all focus:ring-2 focus:ring-[#007AFF]/10 cursor-pointer" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[12px] font-bold text-[#3A3A3C] mb-1.5 pl-1">시작 시간 <span class="text-[#FF3B30]">*</span></label>

      {author: "헬렌 켈러 (저술가, 미국)", text: "혼자서는 할 수 없지만 함께라면 무엇이든 가능하다."},
      {author: "순자 (사상가, 중국)", text: "외기러기가 무리가 될 수 없고, 외나무가 숲이 될 수 없다."},
      {author: "생텍쥐페리 (소설가, 프랑스)", text: "배를 만들게 하려면 끝없는 바다를 동경하게 하라."},
      {author: "존 던 (시인, 영국)", text: "어떤 사람도 그 자체로 온전한 섬은 아니다."},
      {author: "마틴 루터 킹 (운동가, 미국)", text: "함께 형제로 사는 법을 배우지 못하면 바보로 죽는다."},
      {author: "앤드류 카네기 (기업가, 미국)", text: "함께 일하는 능력이야말로 성공의 열쇠다."},
      {author: "워런 버핏 (투자자, 미국)", text: "신용을 쌓는 데는 20년이 걸리지만 무너지는 데는 5분이면 족하다."},
      {author: "성철 (종교인, 한국)", text: "자기를 속이지 말라."},
      {author: "묵자 (사상가, 중국)", text: "서로 사랑하고 이로움을 나누어라."},
      {author: "피타고라스 (수학자, 그리스)", text: "조화는 다름의 아름다운 결합이다."},
      {author: "마르틴 부버 (철학자, 오스트리아)", text: "모든 참된 삶은 만남이다."},
      {author: "달라이 라마 (종교인, 티베트)", text: "자비심은 나침반과 같다."},
      {author: "슈바이처 (의사, 독일)", text: "타인을 돕는 자만이 진정으로 행복하다."},
      {author: "에마뉘엘 레비나스 (철학자, 프랑스)", text: "타자의 얼굴은 나에게 책임을 묻는다."},
      {author: "공자 (사상가, 중국)", text: "다름을 인정하되 같아지기를 강요하지 않는다."},
      {author: "아인슈타인 (물리학자, 미국)", text: "평화는 무력이 아니라 이해를 통해 유지된다."},
      {author: "존 듀이 (철학자, 미국)", text: "민주주의는 삶의 한 방식이다."},
      {author: "요한 피히테 (철학자, 독일)", text: "인간은 오직 인간 사이에서만 인간이 된다."},
      {author: "마르쿠스 아우렐리우스 (철학자, 로마)", text: "우리 삶은 생각의 질에 달려 있다."},
      {author: "빅터 프랭클 (의사, 오스트리아)", text: "고난에 의미를 부여할 때 고통은 사라진다."},
      {author: "틱낫한 (종교인, 베트남)", text: "현재의 순간 속에 모든 평화가 있다."},
      {author: "에픽테토스 (철학자, 로마)", text: "일어나는 일보다 어떻게 받아들이느냐가 중요하다."},
      {author: "파스칼 (수학자, 프랑스)", text: "인간의 존엄성은 사고하는 능력에 있다."},
      {author: "맹자 (사상가, 중국)", text: "하늘이 큰 임무를 내릴 때는 먼저 고난을 주신다."},
      {author: "버트런드 러셀 (철학자, 영국)", text: "희망은 어떤 상황에서도 결코 사라지지 않는다."},
      {author: "찰스 슈밥 (기업가, 미국)", text: "진심 어린 칭찬은 사람의 능력을 꽃피우게 한다."},
      {author: "헤르만 헤세 (소설가, 스위스)", text: "새는 알을 깨고 나온다. 투쟁해야 한다."},
      {author: "쇼펜하우어 (철학자, 독일)", text: "인격은 우리 안에 있는 영원한 자산이다."},
      {author: "에리히 프롬 (심리학자, 미국)", text: "자기 자신을 사랑하는 것이 진정한 사랑의 첫걸음이다."},
      {author: "노자 (사상가, 중국)", text: "남을 아는 것은 지혜롭지만, 자신을 아는 것은 깨달음이다."},
      {author: "칼 로저스 (심리학자, 미국)", text: "있는 그대로의 나를 수용할 때 내가 변화한다."},
      {author: "루미 (시인, 페르시아)", text: "우주에 있는 모든 것은 당신 안에 있다."},
      {author: "파스칼 (수학자, 프랑스)", text: "짧은 편지를 쓸 시간이 없어서 긴 편지를 썼다."},
      {author: "장자 (사상가, 중국)", text: "쓸모없어 보이는 것이 때로는 가장 큰 쓸모가 있다."},
      {author: "마르쿠스 아우렐리우스 (철학자, 로마)", text: "내면을 들여다보라. 거기에 선의 샘이 있다."},
      {author: "지그문트 프로이트 (심리학자, 오스트리아)", text: "감정이 요동치는 곳에 이성이 자리해야 한다."},
      {author: "데일 카네기 (작가, 미국)", text: "행복은 외부의 상황이 아니라 당신의 생각에 달려 있다."},
      {author: "로버트 슐러 (종교인, 미국)", text: "불가능한 일은 없다, 불가능한 생각만 있을 뿐이다."},
      {author: "나폴레옹 (군인, 프랑스)", text: "리더는 희망을 배달하는 사람이다."},
      {author: "손무 (전략가, 중국)", text: "지피지기면 백전불태다."},
      {author: "존 맥스웰 (작가, 미국)", text: "리더는 길을 알고, 가고, 보여주는 사람이다."},
      {author: "로버트 그린리프 (경영학자, 미국)", text: "섬기는 리더십이 진정한 힘이다."},
      {author: "조지 버나드 쇼 (극작가, 아일랜드)", text: "자신을 개선하는 것이 세상을 개선하는 길이다."},
      {author: "짐 콜린스 (경영학자, 미국)", text: "좋은 것은 위대한 것의 적이다."},
      {author: "시몬 드 보부아르 (철학자, 프랑스)", text: "스스로 존재를 정의하는 것이 자유다."},
      {author: "장 자크 루소 (철학자, 프랑스)", text: "가장 유능한 사람은 가장 인내하는 사람이다."},
      {author: "윈스턴 처칠 (정치인, 영국)", text: "포기하지 마라, 절대 포기하지 마라."},
      {author: "토마스 아 켐피스 (사상가, 독일)", text: "자기 자신을 다스리는 자가 세계를 다스린다."},
      {author: "장 폴 사르트르 (철학자, 프랑스)", text: "우리는 우리의 선택에 의해 결정된다."},
      {author: "칸트 (철학자, 독일)", text: "언제나 보편적 입법의 원리가 될 수 있도록 행위하라."},
      {author: "맹자 (사상가, 중국)", text: "부끄러움을 아는 마음이 의로움의 시작이다."},
      {author: "존 스튜어트 밀 (철학자, 영국)", text: "다른 사람에게 해를 끼치지 않는 한 인간은 완전히 자유롭다."},
      {author: "막스 베버 (사회학자, 독일)", text: "책임 윤리는 결과에 대한 책임을 지는 것이다."},
      {author: "한나 아렌트 (철학자, 미국)", text: "악의 평범성은 생각하지 않음에서 온다."},
      {author: "공자 (사상가, 중국)", text: "잘못을 알고도 고치지 않는 것이 진정한 잘못이다."},
      {author: "에드먼드 버크 (정치인, 영국)", text: "자유는 언제나 책임과 짝을 이룬다."},
      {author: "아담 스미스 (경제학자, 영국)", text: "타인의 감정에 동감하는 능력이 도덕의 기초다."},
      {author: "토마스 제퍼슨 (정치인, 미국)", text: "정직은 지혜라는 책의 첫 번째 장이다."},
      {author: "스티브 잡스 (기업가, 미국)", text: "갈망하라, 우직하게 나아가라."},
      {author: "알베르트 아인슈타인 (물리학자, 미국)", text: "상상력이 지식보다 중요하다."},
      {author: "토마스 에디슨 (발명가, 미국)", text: "천재는 1% 영감과 99% 노력으로 만들어진다."},
      {author: "프랜시스 베이컨 (철학자, 영국)", text: "아는 것이 힘이다."},
      {author: "조셉 슘페터 (경제학자, 오스트리아)", text: "창조적 파괴가 혁신의 본질이다."},
      {author: "파블로 피카소 (화가, 스페인)", text: "모든 창조는 파괴에서 시작된다."},
      {author: "에이브러햄 매슬로 (심리학자, 미국)", text: "도구가 망치뿐이면 모든 문제를 못으로 본다."},
      {author: "칼 포퍼 (철학자, 영국)", text: "우리는 무지를 통해 지혜에 도달한다."},
      {author: "말콤 글래드웰 (작가, 캐나다)", text: "일만 시간의 법칙을 믿으라."},
      {author: "하워드 가드너 (심리학자, 미국)", text: "인간의 지능은 다각도로 존재한다."},
      {author: "윌리엄 깁슨 (소설가, 미국)", text: "미래는 이미 와 있다. 널리 퍼지지 않았을 뿐이다."},
      {author: "미하일 고르바초프 (정치인, 러시아)", text: "늦게 오는 자는 역사가 처벌한다."},
      {author: "막스 베버 (사회학자, 독일)", text: "혁신은 일상의 단호한 파괴에서 온다."},
      {author: "랄프 에머슨 (사상가, 미국)", text: "낡은 껍질을 벗어야 새살이 돋는다."},
      {author: "빌 게이츠 (기업가, 미국)", text: "가장 불만족스러운 고객이 위대한 배움의 원천이다."},
      {author: "벤저민 디즈레일리 (정치인, 영국)", text: "변화는 피할 수 없다. 변화는 생명이다."},
      {author: "피터 드러커 (경영학자, 미국)", text: "변화를 주도하지 않으면 변화당한다."},
      {author: "존 F. 케네디 (정치인, 미국)", text: "변화는 삶의 법칙이다."},
      {author: "제임스 (심리학자, 미국)", text: "진리는 유용한 것이다."},
      {author: "에디슨 (발명가, 미국)", text: "가장 못난 변명은 '시간이 없어서'다."},
      {author: "오비디우스 (시인, 로마)", text: "바위를 뚫는 것은 물방울의 힘이 아니라 꾸준함이다."},
      {author: "호라티우스 (시인, 로마)", text: "오늘을 잡아라."},
      {author: "레프 톨스토이 (소설가, 러시아)", text: "세상에서 가장 중요한 시간은 바로 지금이다."},
      {author: "미켈란젤로 (미술가, 이탈리아)", text: "아직도 나는 배우고 있다."},
      {author: "한나 아렌트 (철학자, 미국)", text: "인간의 본질은 시작하는 능력에 있다."},
      {author: "프리드리히 실러 (시인, 독일)", text: "시간을 아끼는 자가 승리한다."},
      {author: "볼테르 (철학자, 프랑스)", text: "노동은 권태, 부도덕, 결핍의 악을 멀리하게 한다."},
      {author: "아우구스티누스 (신학자, 로마)", text: "희망은 분노와 용기라는 두 딸을 두었다."},
      {author: "에리히 프롬 (심리학자, 미국)", text: "소유보다 존재에 집중하라."},
      {author: "미셸 푸코 (철학자, 프랑스)", text: "지식은 지배 수단이 아니라 해방 도구다."},
      {author: "찰스 슐츠 (만화가, 미국)", text: "어제는 역사, 내일은 미스터리, 오늘은 선물이다."},
      {author: "라이너 마리아 릴케 (시인, 오스트리아)", text: "당신의 일상을 사랑하라."},
      {author: "세네카 (철학자, 로마)", text: "인생은 짧은 것이 아니라 우리가 낭비하는 것이다."},
      {author: "가브리엘 마르셀 (철학자, 프랑스)", text: "존재한다는 것은 참여한다는 것이다."},
      {author: "폴 틸리히 (신학자, 독일)", text: "진정으로 존재하려는 용기가 필요하다."},
      {author: "루시우스 세네카 (철학자, 로마)", text: "훌륭하게 살기 위해 태어났다."},
      {author: "키르케고르 (철학자, 덴마크)", text: "인생은 풀어야 할 문제가 아니라 경험해야 할 현실이다."},
      {author: "하이데거 (철학자, 독일)", text: "언어는 존재의 집이다."},
      {author: "헨리 데이비드 소로 (사상가, 미국)", text: "인생의 골수까지 빨아먹고 싶었다."},
      {author: "메를로퐁티 (철학자, 프랑스)", text: "우리는 항상 세계 속에 있다."},
      {author: "넬슨 만델라 (정치인, 남아프리카공화국)", text: "가장 큰 영광은 일어서는 것이다."},
      {author: "서머싯 몸 (소설가, 영국)", text: "고통은 사람을 강하게 만들거나 부러뜨린다."},
      {author: "오프라 윈프리 (방송인, 미국)", text: "실패는 성공으로 가는 이정표일 뿐이다."},
      {author: "월트 디즈니 (기업가, 미국)", text: "꿈꿀 수 있다면 이룰 수 있다."},
      {author: "에드먼드 힐러리 (탐험가, 뉴질랜드)", text: "우리가 정복하는 것은 산이 아니라 우리 자신이다."},
      {author: "율리우스 카이사르 (정치인, 로마)", text: "주사위는 던져졌다."},
      {author: "마크 트웨인 (소설가, 미국)", text: "20년 뒤 당신은 하지 않은 일에 더 후회할 것이다."},
      {author: "제인 구달 (동물학자, 영국)", text: "모든 생명은 연결되어 있으며 각자가 차이를 만든다."},
      {author: "조앤 롤링 (소설가, 영국)", text: "밑바닥은 내 인생을 다시 세울 단단한 기반이 되었다."},
      {author: "찰스 디킨스 (소설가, 영국)", text: "남의 짐을 덜어주는 자는 결코 쓸모없는 인간이 아니다."},
      {author: "에픽테토스 (철학자, 로마)", text: "어떤 위대한 것도 하루아침에 만들어지지 않는다."},
      {author: "헬렌 켈러 (저술가, 미국)", text: "성격은 쉽고 조용하게 개발될 수 없다."},
      {author: "아우구스티누스 (신학자, 로마)", text: "인내는 지혜의 영원한 동반자다."},
      {author: "장 자크 루소 (철학자, 프랑스)", text: "인내는 쓰지만 그 열매는 달다."},
      {author: "안톤 체호프 (소설가, 러시아)", text: "지혜는 경험을, 경험은 인내를 통해 얻어진다."},
      {author: "사무엘 존슨 (문학가, 영국)", text: "위대한 일은 힘이 아니라 끈기로 이루어진다."},
      {author: "데카르트 (철학자, 프랑스)", text: "천천히 걷더라도 결코 뒤로 물러서지 마라."},
      {author: "카를 융 (심리학자, 스위스)", text: "견뎌낼 수 있는 한 희망은 있다."},

        setTimeout(() => {
          const q = QUOTES[currentQuoteIndex];
          textEl.innerText = `“${q.text}”`;

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
     
      let icon, bgClass, textClass;
      if (type === 'success') {
        icon = 'check-circle'; bgClass = 'bg-[#34C759]/10'; textClass = 'text-[#34C759]';
      } else if (type === 'error') {
        icon = 'alert-triangle'; bgClass = 'bg-[#FF3B30]/10'; textClass = 'text-[#FF3B30]';
      } else {
        icon = 'info'; bgClass = 'bg-[#007AFF]/10'; textClass = 'text-[#007AFF]';
      }

      toast.className = `toast-enter flex items-center gap-3 bg-white shadow-xl border border-gray-300 rounded-full px-5 py-3.5 pointer-events-auto`;
      toast.innerHTML = `<div class="p-1 rounded-full ${bgClass} ${textClass}"><i data-feather="${icon}" class="w-4 h-4"></i></div><span class="text-[14px] font-bold text-[#1D1D1F] pr-2">${message}</span>`;
      container.appendChild(toast);
      feather.replace();

      setTimeout(() => {
        toast.style.animation = 'fadeIn 0.3s ease-in reverse forwards';

    window.exportToExcel = function() {
      if (tasks.length === 0) {
        showToast('다운로드할 데이터가 없습니다.', 'error');
        return;
      }
      
      if (typeof XLSX === 'undefined') {
        showToast('엑셀 변환 라이브러리를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.', 'error');
        return;
      }
     
      const headers1 = ['일련번호', '업무 제목', '구분', '소 파트', '담당자', '장소', '시작일자', '종료일자', '시작시간', '종료시간', '주요업무 여부', '상세메모'];
      const rows1 = tasks.map(task => {
        const teamName = TEAMS.find(t => t.id === task.teamId)?.name || '알 수 없음';
        const typeName = task.type === 'section' ? '과단위' : (task.type === 'department' ? '부서단위' : '개인별');
        const isFocusText = task.isFocus ? 'O' : 'X';
       
        return [
          task.id, task.title, typeName, teamName, task.assignee,
          task.location || '', task.startDate, task.endDate, task.startTime, task.endTime,
          isFocusText, task.description || ''
        ];
      });
      const ws1 = XLSX.utils.aoa_to_sheet([headers1, ...rows1]);

      const headers2 = ['소속파트', '상세메모', '담당자', '시작일자'];
      const rows2 = [];
      const teamOrder = {};
      TEAMS.forEach((t, i) => teamOrder[t.id] = i);

      const sortedTasks = [...tasks].sort((a, b) => {
        const teamA = teamOrder[a.teamId] ?? 99;
        const teamB = teamOrder[b.teamId] ?? 99;
        if (teamA !== teamB) return teamA - teamB;
        return (a.startTime || '').localeCompare(b.startTime || '');
      });

      sortedTasks.forEach(task => {
        if (!task.description) return; 
        const teamName = TEAMS.find(t => t.id === task.teamId)?.name || '알 수 없음';
        const assigneeName = task.assignee || '';
        const startDate = task.startDate || ''; 
        const lines = task.description.split('\n'); 
        
        let isFirstLine = true; 
        lines.forEach(line => {
          const trimmedLine = line.replace(/\r/g, '').trim();
          if (trimmedLine !== '') {
            if (isFirstLine) {
              rows2.push([teamName, trimmedLine, assigneeName, startDate]);
              isFirstLine = false;
            } else {
              rows2.push(['', trimmedLine, '', '']);
            }
          }
        });
      });
      const ws2 = XLSX.utils.aoa_to_sheet([headers2, ...rows2]);

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws1, "전체업무");
      XLSX.utils.book_append_sheet(wb, ws2, "주간업무");
     
      XLSX.writeFile(wb, `동반성장부_업무일정_${formatDateForInput(new Date())}.xlsx`);
      showToast('엑셀 파일 다운로드가 완료되었습니다.', 'success');
    }

      const monthTasks = filtered.filter(t => t.startDate.startsWith(currentYearMonth) || t.endDate.startsWith(currentYearMonth));
      
      const actualTodayStr = formatDateForInput(new Date()); 
      const focusTasks = monthTasks.filter(t => t.isFocus && t.endDate >= actualTodayStr).sort((a, b) => {
        if (a.startDate !== b.startDate) return a.startDate.localeCompare(b.startDate);
        return a.startTime.localeCompare(b.startTime);
      });

      let keyTasksHtml = '';
      if (focusTasks.length === 0) {
        keyTasksHtml = `<span class="text-[14px] text-[#48484A] px-1 py-1 font-bold">지정된 포커스 업무가 없습니다.</span>`;
      } else {
        focusTasks.forEach(task => {
          const team = TEAMS.find(t => t.id === task.teamId);
          const dateRangeBadge = formatTaskDateRange(task.startDate, task.endDate);

          keyTasksHtml += `
            <div onclick="window.handleFocusTaskClick('${task.id}', '${task.startDate}')" ondblclick="window.openEditTaskModal('${task.id}')" class="cursor-pointer px-3 py-2 rounded-[14px] text-[13px] flex items-center gap-2 transition-all bg-white hover:bg-[#F2F2F7] border border-gray-300 shadow-sm select-none" title="클릭하여 상세 일정 보기 / 더블 클릭하여 수정">
              <span class="text-[11px] font-bold text-[#1D1D1F] bg-[#F2F2F7] px-2 py-0.5 rounded-[6px] border border-gray-200">${dateRangeBadge}</span>
              <div class="w-2 h-2 rounded-full" style="background-color: ${team.hex};"></div>
              <span class="font-bold text-[#1D1D1F] truncate max-w-[150px]">${task.title}</span>
            </div>
          `;
        });
      }
      document.getElementById('key-tasks-container').innerHTML = keyTasksHtml;
    }

    // --- [스마트폰 터치 최적화 팝업 열기/닫기 로직] ---
    window.showDayPopover = function(e, dateStr, customRect = null) {
      if (e) e.stopPropagation(); 
      const popover = document.getElementById('calendar-popover');
      const title = document.getElementById('popover-title');
      const content = document.getElementById('popover-content');

      const d = new Date(dateStr);
      title.innerText = `${d.getMonth() + 1}월 ${d.getDate()}일 전체 일정`;

      const dayTasks = getFilteredTasks().filter(t => t.startDate <= dateStr && t.endDate >= dateStr)
                               .sort((a, b) => a.startTime.localeCompare(b.startTime));

      let html = '';
      dayTasks.forEach(t => {
        const team = TEAMS.find(x => x.id === t.teamId);
        html += `
          <div onclick="window.openEditTaskModal('${t.id}')" class="flex flex-col px-2.5 py-1.5 rounded-[8px] border ${team.border} ${team.bg} cursor-pointer hover:opacity-80 transition-opacity active:scale-[0.98]">
            <div class="flex justify-between items-center mb-0.5">
              <span class="${team.text} text-[9px] font-bold px-1.5 py-0.5 bg-white/60 rounded-[4px] border ${team.border}">${team.name}</span>
              <span class="text-[10px] text-[#48484A] font-bold">${t.startTime}</span>
            </div>
            <span class="text-[#1D1D1F] text-[12px] font-bold leading-tight truncate">${t.title}</span>
          </div>
        `;
      });
      content.innerHTML = html;

      popover.classList.remove('hidden');
      popover.classList.add('flex'); 
      
      setTimeout(() => {
        const rect = customRect || (e ? e.target.getBoundingClientRect() : {top: 0, left: 0, width: 0, height: 0});

        if (window.innerWidth <= 1024) {
            popover.style.left = '50%';
            popover.style.top = '50%';
            popover.style.transform = 'translate(-50%, -50%)';
        } else {
            let top = rect.top; 
            let left = rect.left + rect.width + 10;

            if (left + popover.offsetWidth > window.innerWidth) {
              left = rect.left - popover.offsetWidth - 10;
            }

            if (top + popover.offsetHeight > window.innerHeight) {
              top = window.innerHeight - popover.offsetHeight - 15;
            }
            if (top < 10) top = 10; 

            popover.style.left = left + 'px';
            popover.style.top = top + 'px';
            popover.style.transform = 'none'; 
        }

        popover.classList.remove('opacity-0', 'pointer-events-none');
        popover.classList.add('opacity-100', 'pointer-events-auto');
        feather.replace();
      }, 10);
    };

    window.closeDayPopover = function() {
      const popover = document.getElementById('calendar-popover');
      popover.classList.remove('opacity-100', 'pointer-events-auto');
      popover.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        popover.classList.add('hidden');
        popover.classList.remove('flex');
      }, 200);
    };

    // --- [시간 드롭다운 커스텀 렌더링 및 제어 로직] ---
    function renderTimeDropdown(type, validOptions) {
      const ul = document.getElementById(`dropdown_${type}Time`);
      if (!ul) return;
      ul.innerHTML = '';
      validOptions.forEach(time => {
          const li = document.createElement('li');
          li.className = "px-4 py-2.5 text-[14px] font-bold text-[#1D1D1F] hover:bg-[#007AFF] hover:text-white cursor-pointer transition-colors";
          li.innerText = time;
          li.onclick = (e) => {
              e.stopPropagation();
              window.selectTime(type, time);
          };
          ul.appendChild(li);
      });
    }

    window.toggleTimeDropdown = function(e, type) {
      if (e) e.stopPropagation();
      const dropdown = document.getElementById('dropdown_' + type + 'Time');
      const isHidden = dropdown.classList.contains('hidden');
      const inputEl = document.getElementById('f_' + type + 'Time');
      
      document.getElementById('dropdown_startTime').classList.add('hidden');
      document.getElementById('dropdown_endTime').classList.add('hidden');
      
      if (isHidden && !inputEl.disabled) {
          dropdown.classList.remove('hidden');
          
          const currentValue = inputEl.value;
          setTimeout(() => {
              const items = Array.from(dropdown.getElementsByTagName('li'));
              const selectedItem = items.find(li => li.innerText === currentValue);
              if (selectedItem) {
                  dropdown.scrollTop = selectedItem.offsetTop;
              }
          }, 10); 
      }
    };

    window.selectTime = function(type, time) {
      document.getElementById('f_' + type + 'Time').value = time;
      document.getElementById('dropdown_' + type + 'Time').classList.add('hidden');
      
      if (type === 'start') {
          document.getElementById('f_endTime').value = time;
          window.handleTimeConstraints(); 
      }
    };

    document.addEventListener('click', (e) => {
      const popover = document.getElementById('calendar-popover');
      if (!popover.classList.contains('hidden') && !popover.contains(e.target)) {
        window.closeDayPopover();
      }

      const d1 = document.getElementById('dropdown_startTime');
      const d2 = document.getElementById('dropdown_endTime');
      if (d1 && !e.target.closest('.relative') && !d1.contains(e.target)) d1.classList.add('hidden');
      if (d2 && !e.target.closest('.relative') && !d2.contains(e.target)) d2.classList.add('hidden');
    });

    // --- [모바일/PC 맞춤형 셀 클릭 이벤트 핸들러] ---
    window.handleCellClick = function(event, dateStr) {
      if (event) event.stopPropagation(); 
      
      const currentTime = new Date().getTime();
      const timeDiff = currentTime - lastClickTime;

      if (timeDiff < 400 && lastClickDate === dateStr) {
        window.openModal(new Date(dateStr));
        window.closeDayPopover();
        lastClickTime = 0; 
        return;
      }
      
      lastClickTime = currentTime;
      lastClickDate = dateStr;

      const rect = event.currentTarget.getBoundingClientRect();
      
      window.selectedDate = new Date(dateStr);
      window.selectedTaskId = null;
      updateAll();

      if (window.innerWidth <= 1024) {
        const dayTasks = getFilteredTasks().filter(t => t.startDate <= dateStr && t.endDate >= dateStr);
        if (dayTasks.length > 0) {
          window.showDayPopover(event, dateStr, rect);
        }
      }
    };


    // --- [캘린더 렌더링] ---
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;

      let legendsHtml = '';
      TEAMS.forEach(team => {
        legendsHtml += `<span class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full" style="background-color:${team.hex}"></div> ${team.name}</span>`;
      });
      document.getElementById('calendar-legends').innerHTML = legendsHtml;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const filtered = getFilteredTasks();

      let gridHtml = '';

      for (let i = 0; i < 42; i++) {
        const dayNum = i - firstDay + 1;
        const isCurrentMonth = dayNum > 0 && dayNum <= daysInMonth;
        const cellDate = isCurrentMonth ? new Date(year, month, dayNum) : null;
        const cellDateStr = cellDate ? formatDateForInput(cellDate) : '';
        const isCellToday = isSameDate(cellDate, today);
        const isSelected = isSameDate(cellDate, window.selectedDate);
       
        const holidayName = isCurrentMonth ? HOLIDAYS[cellDateStr] : null;
        const isSunday = i % 7 === 0;
        const isSaturday = i % 7 === 6;
        const isRedDay = isCurrentMonth && (isSunday || holidayName);
       
        let cellClasses = `relative border-r border-b border-gray-200 transition-colors p-1.5 flex flex-col h-full overflow-hidden `;
        if (!isCurrentMonth) cellClasses += `bg-[#F9F9FB] text-black/15 `;
        else {
          cellClasses += `bg-white hover:bg-gray-50 cursor-pointer `;
          if (isSelected) cellClasses += `ring-2 ring-inset ring-[#007AFF] z-10 bg-[#007AFF]/5 rounded-[4px] `;
        }

        let cellContent = '';
       
        if (isCurrentMonth) {
          const dayTasks = filtered.filter(t => t.startDate <= cellDateStr && t.endDate >= cellDateStr)
                                   .sort((a, b) => a.startTime.localeCompare(b.startTime));

          let numColorClass = 'text-[#1D1D1F]';
          if (isCellToday) numColorClass = 'text-white';
          else if (isRedDay) numColorClass = 'text-[#FF3B30]';
          else if (isSaturday) numColorClass = 'text-[#007AFF]';

          const numDisplay = isCellToday ? `<span class="bg-[#007AFF] w-6 h-6 flex items-center justify-center rounded-full shadow-md font-bold text-white">${dayNum}</span>` : `<span class="w-6 h-6 flex items-center justify-center font-bold ${numColorClass}">${dayNum}</span>`;
          const dateLabel = `<div class="absolute top-1.5 left-1.5 z-10">${numDisplay}</div>`;
          
          const holidayLabel = holidayName ? `<span class="absolute top-1.5 right-1.5 text-[10px] font-bold text-[#FF3B30] truncate text-right bg-white/60 px-1 rounded z-0">${holidayName}</span>` : '';

          let tasksHtml = `
            <div class="flex items-start w-full h-full relative z-20 pt-[2px]">
               <div class="w-[26px] shrink-0"></div> 
               <div class="flex flex-col gap-1 flex-1 min-w-0">
          `;

          if (dayTasks.length > 0) {
              const MAX_VISIBLE = 4; 
              
              if (dayTasks.length <= MAX_VISIBLE) {
                  dayTasks.forEach(t => {
                      const team = TEAMS.find(x => x.id === t.teamId);
                      tasksHtml += `
                        <div class="w-full bg-white rounded-[4px] shadow-sm">
                            <div ondblclick="event.stopPropagation(); window.openEditTaskModal('${t.id}')"
                                 class="w-full ${team.bg} ${team.text} px-1.5 py-0.5 rounded-[4px] text-[10px] sm:text-[11px] font-bold truncate border ${team.border} leading-tight hover:opacity-80 transition-opacity"
                                 title="${t.title}">
                              ${t.title}
                            </div>
                        </div>
                      `;
                  });
              } else {
                  for(let j=0; j<MAX_VISIBLE-1; j++) {
                      const t = dayTasks[j];
                      const team = TEAMS.find(x => x.id === t.teamId);
                      tasksHtml += `
                        <div class="w-full bg-white rounded-[4px] shadow-sm">
                            <div ondblclick="event.stopPropagation(); window.openEditTaskModal('${t.id}')"
                                 class="w-full ${team.bg} ${team.text} px-1.5 py-0.5 rounded-[4px] text-[10px] sm:text-[11px] font-bold truncate border ${team.border} leading-tight hover:opacity-80 transition-opacity"
                                 title="${t.title}">
                              ${t.title}
                            </div>
                        </div>
                      `;
                  }

                  const tLast = dayTasks[MAX_VISIBLE-1];
                  const teamLast = TEAMS.find(x => x.id === tLast.teamId);
                  const hiddenCount = dayTasks.length - MAX_VISIBLE;

                  tasksHtml += `
                    <div class="flex items-center gap-1 w-full">
                        <div class="flex-1 min-w-0 bg-white rounded-[4px] shadow-sm">
                            <div ondblclick="event.stopPropagation(); window.openEditTaskModal('${tLast.id}')"
                                 class="w-full ${teamLast.bg} ${teamLast.text} px-1.5 py-0.5 rounded-[4px] text-[10px] sm:text-[11px] font-bold truncate border ${teamLast.border} leading-tight hover:opacity-80 transition-opacity"
                                 title="${tLast.title}">
                              ${tLast.title}
                            </div>
                        </div>
                        <div onclick="window.showDayPopover(event, '${cellDateStr}')"
                             class="shrink-0 bg-white text-[#48484A] hover:bg-[#007AFF] hover:text-white px-1.5 py-0.5 rounded-[4px] text-[9px] font-bold text-center border border-gray-300 cursor-pointer transition-all shadow-sm"
                             title="${hiddenCount}개 더보기">
                          +${hiddenCount}
                        </div>
                    </div>
                  `;
              }
          }

          tasksHtml += `
               </div>
            </div>
          `;

          cellContent = dateLabel + holidayLabel + tasksHtml;
        } else {
          cellContent = `<div class="text-[14px] md:text-[15px] font-bold p-1">${dayNum > 0 ? dayNum : ''}</div>`;
        }

        const onClickAttr = isCurrentMonth ? `onclick="window.handleCellClick(event, '${cellDateStr}')"` : '';
        gridHtml += `<div class="${cellClasses}" ${onClickAttr}>${cellContent}</div>`;
      }
     
      document.getElementById('calendar-grid').innerHTML = gridHtml;
    }

      const dateStr = formatDateForInput(window.selectedDate);
      const isHoliday = HOLIDAYS[dateStr];
      const isSun = window.selectedDate.getDay() === 0;

      let titleHtml = `${window.selectedDate.getMonth() + 1}월 ${window.selectedDate.getDate()}일 ${daysStr[window.selectedDate.getDay()]}요일`;

          }

          listHtml += `
            <div ondblclick="window.openEditTaskModal('${task.id}')" class="bg-white rounded-[20px] p-4 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden group border border-gray-300 select-none" title="더블 클릭하여 수정">
              <div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ${team.hex};"></div>
             
              <div class="pl-2.5">
                <div class="flex items-start justify-between mb-1.5">
                  <h4 class="font-bold text-[#1D1D1F] text-[15px] leading-snug flex items-center gap-2">
                    ${task.title} ${focusStarHtml}
                  </h4>
                  <span class="text-[11px] font-bold px-2 py-0.5 rounded-[6px] ${team.bg} ${team.text} border ${team.border} whitespace-nowrap">${team.name}</span>
                </div>
               
                <div class="flex flex-col gap-2 mt-2">
                  <div class="flex items-center gap-3 text-[13px] font-bold text-[#48484A]">
                    <span class="flex items-center gap-1.5 bg-gray-100 px-2 py-0.5 rounded-md border border-gray-200"><i data-feather="clock" class="w-3.5 h-3.5"></i> ${task.startTime} ~ ${task.endTime}</span>

                  <div class="flex items-center gap-2 text-[13px] mt-1 font-bold text-[#1D1D1F]">

    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('login_email').value;
      const password = document.getElementById('login_password').value;
      const btn = document.getElementById('btn_login');
      
      btn.disabled = true;
      btn.innerHTML = `<i data-feather="loader" class="w-4 h-4 spin-slow"></i> 로그인 중...`;
      feather.replace();

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('로그인 성공!', 'success');
      } catch (error) {
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
           showToast('등록되지 않은 이메일이거나 비밀번호가 틀렸습니다. 관리자에게 문의해주세요.', 'error');
        } else {
           showToast('로그인 중 오류가 발생했습니다. (' + error.code + ')', 'error');
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>로그인</span>`;
        document.getElementById('login_password').value = '';
      }
    };

    window.handleLogout = async function() {
      try {
        await signOut(auth);
        showToast('로그아웃 되었습니다.', 'success');
      } catch (error) {
        console.error("Logout failed:", error);
      }
    };

    window.openPasswordModal = function() {
      document.getElementById('pwd_email').value = '';
      document.getElementById('pwd_old').value = '';
      document.getElementById('pwd_new').value = '';
      document.getElementById('pwd_confirm').value = '';
      document.getElementById('passwordModal').classList.remove('hidden');
    };

    window.closePasswordModal = function() {
      document.getElementById('passwordModal').classList.add('hidden');
    };

    window.handlePasswordChange = async function(e) {
      e.preventDefault();
      const email = document.getElementById('pwd_email').value;
      const oldPwd = document.getElementById('pwd_old').value;
      const newPwd = document.getElementById('pwd_new').value;
      const confirmPwd = document.getElementById('pwd_confirm').value;

      if (newPwd !== confirmPwd) {
        showToast('새 비밀번호가 일치하지 않습니다.', 'error');
        return;
      }
      if (newPwd.length < 6) {
        showToast('비밀번호는 6자리 이상이어야 합니다.', 'error');
        return;
      }

      const btn = document.getElementById('btn_change_pwd');
      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i data-feather="loader" class="w-4 h-4 spin-slow"></i> 변경 중...`;
      feather.replace();

      window.isPasswordChanging = true; 

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, oldPwd);
        await updatePassword(userCredential.user, newPwd);
        await signOut(auth);

        showToast('비밀번호가 성공적으로 변경되었습니다. 새 비밀번호로 로그인해주세요.', 'success');
        window.closePasswordModal();
      } catch (error) {
        if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          showToast('등록되지 않은 이메일이거나 현재 비밀번호가 틀렸습니다.', 'error');
        } else {
          showToast('비밀번호 변경 중 오류가 발생했습니다. (' + error.code + ')', 'error');
        }
      } finally {
        window.isPasswordChanging = false;
        btn.disabled = false;
        btn.innerHTML = originalHtml;
        feather.replace();
      }
    };

    /* -------------------------------------------------------------------------- */
    /* 7. 모달 창 및 데이터 CUD 제어 로직                                         */
    /* -------------------------------------------------------------------------- */
    function resetDeleteBtn() {
      const btn = document.getElementById('btn_delete');
      if (btn) {
        btn.innerText = '삭제';
        btn.className = 'px-4 py-2.5 rounded-[10px] text-[14px] font-bold text-[#FF3B30] bg-[#FF3B30]/10 hover:bg-[#FF3B30]/20 border border-transparent hover:border-[#FF3B30]/30 transition-colors active:scale-95';
      }
    }

    window.handleTeamChange = function() {
      const teamId = document.getElementById('f_teamId').value;
      const assigneeInput = document.getElementById('f_assignee');
      const asterisk = document.getElementById('assignee_asterisk');

      if (teamId === 't5') {
        assigneeInput.required = false;
        if (asterisk) asterisk.style.display = 'none';
      } else {
        assigneeInput.required = true;
        if (asterisk) asterisk.style.display = 'inline';
      }
    }

    // --- [시간 논리적 제어 (시작 시간에 따른 종료 시간 완전 제한)] ---
    window.handleTimeConstraints = function() {
      const startDate = document.getElementById('f_startDate').value;
      const endDate = document.getElementById('f_endDate').value;
      const startInput = document.getElementById('f_startTime');
      const endInput = document.getElementById('f_endTime');

      if (endDate && startDate && endDate < startDate) {
          document.getElementById('f_endDate').value = startDate;
      }

      const isSameDay = document.getElementById('f_startDate').value === document.getElementById('f_endDate').value;
      const startVal = startInput.value;
      const currentEndVal = endInput.value;

      const validEndOptions = [];
      timeOptions.forEach(time => {
          if (isSameDay) {
              if (time >= startVal) validEndOptions.push(time);
          } else {
              validEndOptions.push(time);
          }
      });

      renderTimeDropdown('end', validEndOptions);

      if (isSameDay && currentEndVal < startVal) {
          endInput.value = startVal;
      } else if (currentEndVal) {
          endInput.value = currentEndVal;
      }
    };

    window.openModal = function(dateObj = new Date()) {
      currentEditTaskId = null;
      document.getElementById('taskForm').reset();
     
      document.getElementById('modal-title').innerText = "새로운 일정";
      document.getElementById('btn_submit').innerText = "추가";
      document.getElementById('btn_submit').classList.remove('hidden');
     
      const fields = ['title','type','teamId','assignee','location','startDate','endDate','description'];
      fields.forEach(f => document.getElementById('f_' + f).disabled = false);
      document.getElementById('f_isFocus').disabled = false;

      document.getElementById('f_startDate').value = formatDateForInput(dateObj);
      document.getElementById('f_endDate').value = formatDateForInput(dateObj);
      document.getElementById('f_isFocus').checked = false;
     
      document.getElementById('btn_delete').classList.add('hidden');
      document.getElementById('taskModal').classList.remove('hidden');
      document.getElementById('taskForm').scrollTop = 0;
      isDeleteConfirming = false;
      resetDeleteBtn();
      window.handleTeamChange();

      renderTimeDropdown('start', timeOptions);
      const startInput = document.getElementById('f_startTime');
      const endInput = document.getElementById('f_endTime');
      
      startInput.value = "08:00";
      startInput.disabled = false;
      endInput.disabled = false;

      window.handleTimeConstraints(); 
      endInput.value = "17:00"; 

      const emailContainer = document.getElementById('email_action_container');
      emailContainer.classList.add('hidden');
      emailContainer.classList.remove('flex');
    }

    window.openEditTaskModal = function(id) {
      currentEditTaskId = id;
      const task = tasks.find(x => x.id === id);
      if(!task) return;

      const isLegacyTask = !task.creatorEmail; 
      const isCreator = task.creatorEmail === currentUser.email; 
      const canEdit = isLegacyTask || isCreator; 

      document.getElementById('modal-title').innerText = canEdit ? "일정 상세 및 편집" : "일정 상세 조회";
      document.getElementById('btn_submit').innerText = "저장";

      renderTimeDropdown('start', timeOptions);

      const fields = ['title','type','teamId','assignee','location','startDate','endDate','description'];
      fields.forEach(f => {
        const el = document.getElementById('f_' + f);
        el.value = task[f] || '';
        el.disabled = !canEdit;
      });
     
      const startInput = document.getElementById('f_startTime');
      const endInput = document.getElementById('f_endTime');
      
      startInput.value = task.startTime || '08:00';
      startInput.disabled = !canEdit;
      endInput.disabled = !canEdit;

      window.handleTimeConstraints(); 
      endInput.value = task.endTime || '17:00';

      const isFocusEl = document.getElementById('f_isFocus');
      isFocusEl.checked = !!task.isFocus;
      isFocusEl.disabled = !canEdit;
     
      document.getElementById('taskModal').classList.remove('hidden');
      document.getElementById('taskForm').scrollTop = 0;
      isDeleteConfirming = false;
      resetDeleteBtn();
      
      if (canEdit) {
        window.handleTeamChange();
        document.getElementById('btn_submit').classList.remove('hidden');
        document.getElementById('btn_delete').classList.remove('hidden');
      } else {
        document.getElementById('btn_submit').classList.add('hidden');
        document.getElementById('btn_delete').classList.add('hidden');
      }

      const emailContainer = document.getElementById('email_action_container');
      const emailActive = document.getElementById('email_active_view');
      const emailLegacy = document.getElementById('email_legacy_view');
      const emailForm = document.getElementById('email_form');

      if (isLegacyTask) {
        emailContainer.classList.remove('hidden');
        emailContainer.classList.add('flex');
        emailActive.classList.add('hidden');
        emailActive.classList.remove('flex');
        emailLegacy.classList.remove('hidden');
      } else if (!isCreator) {
        emailContainer.classList.remove('hidden');
        emailContainer.classList.add('flex');
        emailActive.classList.remove('hidden');
        emailActive.classList.add('flex');
        emailLegacy.classList.add('hidden');
        
        emailForm.classList.add('hidden');
        emailForm.classList.remove('flex');
        document.getElementById('email_content').value = '';
      } else {
        emailContainer.classList.add('hidden');
        emailContainer.classList.remove('flex');
      }
    }

    window.closeModal = function() {
      document.getElementById('taskModal').classList.add('hidden');
    }

    window.handleTaskSubmit = async function(e) {
      e.preventDefault();
      
      if (!currentUser) {
        showToast('인증 정보가 확인되지 않았습니다. 잠시 후 다시 시도해주세요.', 'error');
        return;
      }

      const existingTask = currentEditTaskId ? tasks.find(x => x.id === currentEditTaskId) : null;
      if (existingTask) {
        const isLegacyTask = !existingTask.creatorEmail;
        const isCreator = existingTask.creatorEmail === currentUser.email;
        if (!isLegacyTask && !isCreator) {
          showToast('작성자 본인만 일정을 수정할 수 있습니다.', 'error');
          return;
        }
      }

      let assigneeVal = document.getElementById('f_assignee').value;
      const teamIdVal = document.getElementById('f_teamId').value;
     
      if (teamIdVal === 't5' && !assigneeVal.trim()) {
        assigneeVal = '담당임원';
      }
     
      const formData = {
        title: document.getElementById('f_title').value,
        type: document.getElementById('f_type').value,
        teamId: teamIdVal,
        assignee: assigneeVal,
        location: document.getElementById('f_location').value,
        startDate: document.getElementById('f_startDate').value,
        endDate: document.getElementById('f_endDate').value,
        startTime: document.getElementById('f_startTime').value,
        endTime: document.getElementById('f_endTime').value,
        description: document.getElementById('f_description').value,
        isFocus: document.getElementById('f_isFocus').checked
      };

      const taskId = currentEditTaskId || Date.now().toString();
      
      const creatorEmail = existingTask && existingTask.creatorEmail ? existingTask.creatorEmail : (currentUser.email || '');

      const finalData = { ...formData, id: taskId, creatorEmail: creatorEmail };
      const taskRef = doc(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks', taskId);

      try {
        await setDoc(taskRef, finalData);
        if (currentEditTaskId) {
            showToast('일정이 성공적으로 수정되었습니다.', 'success');
        } else {
            showToast('새로운 실시간 일정이 등록되었습니다.', 'success');
        }
        window.closeModal();
      } catch (error) {
        console.error("저장 실패:", error);
        showToast('클라우드 저장소와의 연결 오류로 저장에 실패했습니다.', 'error');
      }
    }

    window.handleDeleteBtnClick = async function() {
      if (!currentUser || !currentEditTaskId) return;

      const existingTask = tasks.find(x => x.id === currentEditTaskId);
      if (existingTask) {
        const isLegacyTask = !existingTask.creatorEmail;
        const isCreator = existingTask.creatorEmail === currentUser.email;
        if (!isLegacyTask && !isCreator) {
          showToast('작성자 본인만 일정을 삭제할 수 있습니다.', 'error');
          return;
        }
      }

      if (!isDeleteConfirming) {
        isDeleteConfirming = true;
        const btn = document.getElementById('btn_delete');
        btn.innerText = "정말 삭제할까요?";
        btn.className = "px-4 py-2.5 rounded-[10px] text-[14px] font-bold text-white bg-[#FF3B30] hover:bg-[#D70015] border border-transparent transition-colors active:scale-95";
       
        setTimeout(() => {
          if (isDeleteConfirming && !document.getElementById('taskModal').classList.contains('hidden')) {
            isDeleteConfirming = false;
            resetDeleteBtn();
          }
        }, 3000);
        return;
      }
     
      const taskRef = doc(db, 'artifacts', appId, 'public', 'data', 'workspace_tasks', currentEditTaskId);
      try {
          await deleteDoc(taskRef);
          showToast('일정이 실시간 동기화되어 삭제되었습니다.', 'success');
          window.closeModal();
      } catch (error) {
          console.error("삭제 실패:", error);
          showToast('삭제 중 오류가 발생했습니다.', 'error');
      }
    }

    /* -------------------------------------------------------------------------- */
    /* 8. 메일 발송 로직 추가                                                     */
    /* -------------------------------------------------------------------------- */
    window.toggleEmailForm = function() {
      const emailForm = document.getElementById('email_form');
      if (emailForm.classList.contains('hidden')) {
        emailForm.classList.remove('hidden');
        emailForm.classList.add('flex');
      } else {
        emailForm.classList.add('hidden');
        emailForm.classList.remove('flex');
      }
    }

    window.sendEmail = async function() {
      const task = tasks.find(x => x.id === currentEditTaskId);
      if (!task || !task.creatorEmail) return;

      const content = document.getElementById('email_content').value.trim();
      if (!content) {
        showToast('전달할 코멘트나 업무 지시 내용을 입력해주세요.', 'error');
        return;
      }

      if (!window.EMAIL_API_URL || window.EMAIL_API_URL === "여기에_구글_앱스_스크립트_URL_입력") {
        showToast('메일 전송 서버가 아직 설정되지 않았습니다. 관리자에게 문의하세요.', 'error');
        return;
      }

      const btn = document.getElementById('btn_send_email');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i data-feather="loader" class="w-4 h-4 spin-slow"></i> 발송 중...`;
      feather.replace();

      const senderEmailLower = currentUser.email.toLowerCase();
      const senderName = USER_EMAILS[senderEmailLower];
      const senderDisplay = senderName ? `${currentUser.email}(${senderName})` : currentUser.email;

      const subject = "업무 관련 지시사항(부서 캘린더 기반)";
      const body = `[업무명: ${task.title}]\n\n${content}\n\n--------------------------------------------\n* 발신자: ${senderDisplay}\n* 본 메일은 HD현대삼호 동반성장부 통합 워크스페이스에서 자동 발송되었습니다.`;

      try {
        const response = await fetch(window.EMAIL_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            to: task.creatorEmail,
            replyTo: currentUser.email,
            senderName: "동반성장부 통합 워크스페이스",
            subject: subject,
            body: body
          })
        });

        if (response.ok) {
          showToast('메일이 성공적으로 바로 발송되었습니다.', 'success');
          window.toggleEmailForm();
          document.getElementById('email_content').value = '';
        } else {
          throw new Error('서버 응답 오류');
        }
      } catch (error) {
        console.error("메일 발송 실패:", error);
        showToast('메일 발송 중 오류가 발생했습니다.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        feather.replace();
      }
    }

    /* -------------------------------------------------------------------------- */
    /* 9. 앱 초기화 실행                                                          */
    /* -------------------------------------------------------------------------- */
    document.addEventListener('DOMContentLoaded', () => {
      const selectEl = document.getElementById('f_teamId');
      TEAMS.forEach(team => {
        selectEl.add(new Option(team.name, team.id));
      });
      feather.replace();
    });
  </script>
